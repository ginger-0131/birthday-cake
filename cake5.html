<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Particle Dream Cake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06010a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 40px 20px;
            -webkit-user-select: none;
            user-select: none;
        }
        .header {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            max-width: 90vw;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }
        .header.show {
            opacity: 1;
            transform: translateY(0);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #f3adff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(243, 173, 255, 0.6);
            line-height: 1.3;
        }
        .header p {
            color: #a59cb0;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            z-index: 10;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            background: linear-gradient(135deg, #da44ff, #892cdc);
            border: none;
            color: white;
            padding: 14px 40px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(137, 44, 220, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn.reset-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.5);
        }
        @media (min-width: 768px) {
            .header h1 { font-size: 2.4rem; }
            .header p { font-size: 1.1rem; }
            .btn { padding: 16px 45px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="header" id="headerBlock">
        <h1>Cheers to another beautiful year!</h1>
        <p>Make a wish and blow out the candles. 💨</p>
    </div>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="wishBtn">✨ Tap Me!</button>
        <button class="btn reset-btn" id="resetBtn" style="display: none;">🔥 Light Again</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const wishBtn = document.getElementById('wishBtn');
        const resetBtn = document.getElementById('resetBtn');
        const headerBlock = document.getElementById('headerBlock');

        let width, height, scaleFactor;
        let particles = [];
        let state = 'WAITING'; 
        let blowTimer = 0;
        let angleY = 0; // 控制整体3D旋转的角度
        
        const BLOW_THRESHOLD = 75; 

        class Particle {
            constructor(localX, localY, localZ, color, type) {
                // 存储在蛋糕本地坐标系中的3D相对位置
                this.localX = localX;
                this.localY = localY;
                this.localZ = localZ;
                
                // 初始散落分布
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                this.color = color;
                this.type = type; 
                
                const sizeScale = scaleFactor < 1 ? scaleFactor * 1.2 : 1;
                if (type === 'flame') {
                    this.baseSize = (Math.random() * 1.4 + 1.2) * sizeScale;
                } else {
                    this.baseSize = (Math.random() * 0.8 + 0.4) * sizeScale; 
                }
                this.size = this.baseSize;

                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 0.04 + 0.02;
                this.friction = 0.88;
                this.baseAlpha = Math.random() * 0.4 + 0.5;
                this.alpha = this.baseAlpha;

                // 烟雾横向大面积扩散系数
                this.smokeVx = (Math.random() - 0.5) * 16; 
                this.smokeVy = -Math.random() * 6 - 3;     
                
                // 火焰特有的随机扰动相位
                this.flamePhase = Math.random() * 100;
            }

            update(centerX, centerY) {
                if (state === 'WAITING' || state === 'LISTENING') {
                    // 1. 进行真正的 3D 沿 Y 轴旋转坐标变换
                    const cosA = Math.cos(angleY);
                    const sinA = Math.sin(angleY);
                    
                    let rx = this.localX * cosA - this.localZ * sinA;
                    let rz = this.localX * sinA + this.localZ * cosA;
                    let ry = this.localY;

                    // 2. 为火焰粒子添加高仿真的独立摇曳动效
                    if (this.type === 'flame') {
                        // 越往火焰顶部，摇晃幅度越大
                        const heightFactor = (centerY - ry); 
                        const sway = Math.sin(Date.now() * 0.008 + this.flamePhase) * 1.8 * scaleFactor;
                        rx += sway;
                    }

                    // 3. 计算带有空间透视投影的屏幕目标位置
                    // 假设视距为 300，进行近大远小的透视变换
                    const distance = 300 * scaleFactor;
                    const projection = distance / (distance + rz);
                    
                    const targetScreenX = centerX + rx * projection;
                    const targetScreenY = centerY + ry * projection;

                    // 缓动动画向目标投影点收拢
                    let dx = targetScreenX - this.x;
                    let dy = targetScreenY - this.y;
                    
                    this.vx += dx * this.speed;
                    this.vy += dy * this.speed;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;

                    // 4. 根据前后Z轴纵深，动态缩放粒子大小与透明度，创造极致的通透感
                    this.size = this.baseSize * projection;
                    
                    // 火焰加入随机微弱闪烁（火光呼吸感）
                    if (this.type === 'flame') {
                        const flicker = Math.sin(Date.now() * 0.02 + this.flamePhase) * 0.15;
                        this.alpha = (this.baseAlpha + flicker) * projection;
                    } else {
                        this.alpha = this.baseAlpha * projection;
                    }

                } else if (state === 'BLOWING' || state === 'EXTINGUISHED') {
                    if (this.type === 'flame') {
                        // 烟雾四散消散
                        this.x += this.smokeVx;
                        this.y += this.smokeVy;
                        this.smokeVx *= 0.94; 
                        this.smokeVy *= 0.94;
                        this.alpha -= 0.012; 
                        if (this.alpha < 0) this.alpha = 0;
                    } else {
                        // 蛋糕柱体保持原位旋转
                        const cosA = Math.cos(angleY);
                        const sinA = Math.sin(angleY);
                        let rx = this.localX * cosA - this.localZ * sinA;
                        let rz = this.localX * sinA + this.localZ * cosA;
                        const distance = 300 * scaleFactor;
                        const projection = distance / (distance + rz);
                        
                        let dx = (centerX + rx * projection) - this.x;
                        let dy = (centerY + this.localY * projection) - this.y;
                        this.vx += dx * this.speed;
                        this.vy += dy * this.speed;
                        this.x += this.vx * this.friction;
                        this.y += this.vy * this.friction;
                        this.alpha = this.baseAlpha * projection * 0.5; 
                    }
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            const minDim = Math.min(width, height);
            scaleFactor = width < 500 ? minDim / 360 : minDim / 550; 

            generateCakeParticles();
        }

        // 重新进行数学建模：降低密度、突出空灵轮廓与黄金分割比例
        function generateCakeParticles() {
            particles = [];

            // 精简粒子数量，还原视频中透明、清透、不拥挤的空灵高级感
            const layers = [
                { rX: 130 * scaleFactor, h: 50 * scaleFactor, count: 2800, color: '#ffb7e2', topColor: '#ffffff' }, // 底层
                { rX: 95 * scaleFactor,  h: 42 * scaleFactor, count: 1800, color: '#e056fd', topColor: '#ffffff' }, // 中层
                { rX: 65 * scaleFactor,  h: 35 * scaleFactor, count: 1100, color: '#ff75b5', topColor: '#fff0f5' }  // 顶层
            ];

            let currentBaseY = 80 * scaleFactor; // 从蛋糕底部向上建模

            layers.forEach((layer) => {
                for (let i = 0; i < layer.count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    // 使用数学分布让内部粒子更稀疏，边缘更明显，突出外轮廓
                    const randR = Math.pow(Math.random(), 0.7); 
                    const lx = Math.cos(angle) * layer.rX * randR;
                    const lz = Math.sin(angle) * layer.rX * randR;
                    const lh = Math.random() * layer.h;
                    const ly = currentBaseY - lh;

                    let color = layer.color;
                    // 侧边加入立体感色彩明暗交替
                    if (lh > layer.h - 3) {
                        color = layer.topColor; 
                    } else if (Math.cos(angle) > 0.4) {
                        color = '#ffffff'; // 高光点缀
                    }

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }
                currentBaseY -= (layer.h - 5 * scaleFactor);
            });

            // 完美还原截图比例：精致细长的三根发光蜡烛
            const candlePositions = [
                { x: -30 * scaleFactor, z: 10 * scaleFactor,  y: currentBaseY },
                { x: 0,                 z: 0,                 y: currentBaseY - 5 * scaleFactor},
                { x: 30 * scaleFactor,  z: -10 * scaleFactor, y: currentBaseY }
            ];

            candlePositions.forEach(pos => {
                const candleWidth = 4 * scaleFactor;
                const candleHeight = 28 * scaleFactor;
                
                // 蜡烛柱体
                for (let i = 0; i < 90; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * candleWidth;
                    const lx = pos.x + Math.cos(angle) * r;
                    const lz = pos.z + Math.sin(angle) * r;
                    const ly = pos.y - Math.random() * candleHeight;
                    particles.push(new Particle(lx, ly, lz, '#ffffff', 'candle'));
                }
                
                // 【绝美水滴火焰算法重构】还原标准火烛轮廓
                const flameHeight = 24 * scaleFactor;
                const maxFlameWidth = 6.5 * scaleFactor;
                
                for (let i = 0; i < 180; i++) {
                    const t = Math.random(); // 0 到 1 的垂直高度比例
                    
                    // 完美的标准火焰包络线公式：底部收拢 -> 中下部饱满 -> 向上急剧收尖
                    const envelope = Math.sin(t * Math.PI) * (1 - t * 0.6);
                    const currentMaxWidth = maxFlameWidth * envelope;
                    
                    const fAngle = Math.random() * Math.PI * 2;
                    const fR = Math.random() * currentMaxWidth;
                    
                    const lx = pos.x + Math.cos(fAngle) * fR;
                    const lz = pos.z + Math.sin(fAngle) * fR;
                    const ly = (pos.y - candleHeight) - (t * flameHeight);
                    
                    // 火焰核心亮黄色，外围霓虹橙，形成极具逼真感的摇曳火光
                    const color = t < 0.65 && Math.random() > 0.3 ? '#ffe600' : '#ff4500';
                    particles.push(new Particle(lx, ly, lz, color, 'flame'));
                }
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(6, 1, 10, 0.25)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';

            // 匀速旋转角度递增（控制旋转速度，数值越小越平缓优雅）
            if (state === 'WAITING' || state === 'LISTENING' || state === 'BLOWING') {
                angleY += 0.008; 
            }

            if (state === 'BLOWING') {
                blowTimer++;
                if (blowTimer > 90) { 
                    state = 'EXTINGUISHED';
                    resetBtn.style.display = 'block';   
                }
            }

            const centerX = width / 2;
            const centerY = state === 'WAITING' ? height * 0.52 : height * 0.56; 

            particles.forEach(p => {
                p.update(centerX, centerY);
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        function startAudioListening() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.4; 
                analyser.fftSize = 512;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    if (state !== 'LISTENING') return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;

                    if (average > BLOW_THRESHOLD) {
                        state = 'BLOWING';
                        blowTimer = 0;
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            })
            .catch(err => {
                console.warn("麦克风不可用:", err);
            });
        }

        wishBtn.addEventListener('click', () => {
            wishBtn.style.display = 'none';
            headerBlock.classList.add('show'); 
            state = 'LISTENING';
            startAudioListening();
        });

        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            headerBlock.classList.remove('show'); 
            wishBtn.style.display = 'block';
            state = 'WAITING';
            generateCakeParticles(); 
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
