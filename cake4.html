<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Particle Dream Cake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06010a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 40px 20px;
            -webkit-user-select: none;
            user-select: none;
        }
        .header {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            max-width: 90vw;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }
        .header.show {
            opacity: 1;
            transform: translateY(0);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #f3adff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(243, 173, 255, 0.6);
            line-height: 1.3;
        }
        .header p {
            color: #a59cb0;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            z-index: 10;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            background: linear-gradient(135deg, #da44ff, #892cdc);
            border: none;
            color: white;
            padding: 14px 40px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(137, 44, 220, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn.reset-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.5);
        }
        /* 在手机端微调字体大小，使其更完美 */
        @media (min-width: 768px) {
            .header h1 { font-size: 2.4rem; }
            .header p { font-size: 1.1rem; }
            .btn { padding: 16px 45px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="header" id="headerBlock">
        <h1>Cheers to another beautiful year!</h1>
        <p>Make a wish and blow out the candles. 🟟</p>
    </div>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="wishBtn">✨ Tap Me!</button>
        <button class="btn reset-btn" id="resetBtn" style="display: none;">🟟 Light Again</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const wishBtn = document.getElementById('wishBtn');
        const resetBtn = document.getElementById('resetBtn');
        const headerBlock = document.getElementById('headerBlock');

        let width, height, scaleFactor;
        let particles = [];
        let state = 'WAITING'; // WAITING, LISTENING, BLOWING, EXTINGUISHED
        let blowTimer = 0;
        
        const BLOW_THRESHOLD = 75; 

        class Particle {
            constructor(targetX, targetY, color, type) {
                this.targetX = targetX;
                this.targetY = targetY;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.color = color;
                this.type = type; 
                
                // 精细控制手机和PC端的粒子大小
                const sizeScale = scaleFactor < 1 ? scaleFactor * 1.2 : 1;
                if (type === 'flame') {
                    this.size = (Math.random() * 1.5 + 1.2) * sizeScale;
                } else if (type === 'cream' || type === 'candle') {
                    this.size = (Math.random() * 1.2 + 0.7) * sizeScale;
                } else {
                    this.size = (Math.random() * 0.7 + 0.4) * sizeScale; 
                }

                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 0.04 + 0.02;
                this.friction = 0.88;
                this.baseAlpha = Math.random() * 0.5 + 0.5;
                this.alpha = this.baseAlpha;

                // 烟雾爆发四散参数：向左、右、上大面积喷射
                this.smokeVx = (Math.random() - 0.5) * 14; 
                this.smokeVy = -Math.random() * 7 - 3;     
            }

            update() {
                if (state === 'WAITING' || state === 'LISTENING') {
                    let dx = this.targetX - this.x;
                    let dy = this.targetY - this.y;
                    
                    // 让火焰粒子产生真实的动态微风摇曳感
                    if (this.type === 'flame') {
                        dx += Math.sin(Date.now() * 0.009 + this.targetY) * 2 * scaleFactor;
                        dy += Math.cos(Date.now() * 0.007 + this.targetX) * 1 * scaleFactor;
                    }

                    this.vx += dx * this.speed;
                    this.vy += dy * this.speed;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha = this.baseAlpha;

                } else if (state === 'BLOWING' || state === 'EXTINGUISHED') {
                    if (this.type === 'flame') {
                        this.x += this.smokeVx;
                        this.y += this.smokeVy;
                        this.smokeVx *= 0.94; 
                        this.smokeVy *= 0.94;
                        this.alpha -= 0.012; 
                        if (this.alpha < 0) this.alpha = 0;
                    } else {
                        let dx = this.targetX - this.x;
                        let dy = this.targetY - this.y;
                        this.vx += dx * this.speed;
                        this.vy += dy * this.speed;
                        this.vx *= this.friction;
                        this.vy *= this.friction;
                        this.x += this.vx;
                        this.y += this.vy;
                        this.alpha = this.baseAlpha * 0.6; 
                    }
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 【核心重构】动态计算自适应比例，完美匹配PC横屏和手机竖屏
            const minDim = Math.min(width, height);
            scaleFactor = width < 500 ? minDim / 380 : minDim / 600; 

            generateCakeParticles();
        }

        // 高保真 3D 梦幻粒子蛋糕重塑
        function generateCakeParticles() {
            particles = [];
            const centerX = width / 2;
            // 根据屏幕高度动态定位蛋糕中心，给上方的标题留出完美视觉空间
            const centerY = state === 'WAITING' ? height * 0.54 : height * 0.58; 

            // 1. 三层结构半径、高度与密度的精确配合（建立清晰轮廓）
            const layers = [
                { rX: 135 * scaleFactor, rY: 45 * scaleFactor, h: 55 * scaleFactor, count: 6500, color: '#4a154b', topColor: '#f7adff' }, 
                { rX: 105 * scaleFactor, rY: 35 * scaleFactor, h: 48 * scaleFactor, count: 4500, color: '#e056fd', topColor: '#ffffff' }, 
                { rX: 75 * scaleFactor,  rY: 25 * scaleFactor, h: 40 * scaleFactor, count: 3000, color: '#ff75b5', topColor: '#fff0f5' }  
            ];

            let currentBaseY = centerY;

            layers.forEach((layer) => {
                for (let i = 0; i < layer.count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const randR = Math.sqrt(Math.random()); 
                    const curRX = layer.rX * randR;
                    const curRY = layer.rY * randR;
                    
                    const px = centerX + Math.cos(angle) * curRX;
                    const ph = Math.random() * layer.h;
                    const py = currentBaseY - Math.sin(angle) * curRY - ph;

                    let color = layer.color;
                    // 在每一层的顶边缘和侧面交界处加密强化，强化3D立体轮廓
                    if (ph > layer.h - 3) {
                        color = layer.topColor; 
                    } else if (Math.cos(angle) > 0.4) {
                        color = adjustColorBrightness(layer.color, -35); 
                    } else if (Math.cos(angle) < -0.5) {
                        color = '#ffffff'; 
                    }

                    particles.push(new Particle(px, py, color, 'cake'));

                    // 精致的边缘发光奶油点缀
                    if (ph > layer.h - 2 && Math.random() > 0.95) {
                        particles.push(new Particle(px, py - 2, '#00ffcc', 'cream'));
                    }
                }
                currentBaseY -= (layer.h - 8 * scaleFactor);
            });

            // 2. 重新定义细长、匀称的 3 根发光蜡烛位置
            const candlePositions = [
                { x: centerX - 32 * scaleFactor, y: currentBaseY - 10 * scaleFactor },
                { x: centerX,                   y: currentBaseY - 16 * scaleFactor },
                { x: centerX + 32 * scaleFactor, y: currentBaseY - 10 * scaleFactor }
            ];

            candlePositions.forEach(pos => {
                // 稳固、比例适当的白色蜡烛柱体
                const candleWidth = 5 * scaleFactor;
                const candleHeight = 32 * scaleFactor;
                for (let i = 0; i < 150; i++) {
                    const px = pos.x + (Math.random() - 0.5) * candleWidth;
                    const py = pos.y - Math.random() * candleHeight;
                    particles.push(new Particle(px, py, '#ffffff', 'candle'));
                }
                
                // 3. 【重大算法修正】渲染一个标准水滴形态的逼真蜡烛火焰
                const flameHeight = 26 * scaleFactor;
                const maxFlameWidth = 7 * scaleFactor;
                
                for (let i = 0; i < 280; i++) {
                    const t = Math.random(); // 从 0 (火焰底部) 到 1 (火焰尖端)
                    
                    // 核心水滴形状公式：底部饱满，向上急剧收窄
                    const currentMaxWidth = maxFlameWidth * (1 - t) * Math.sqrt(t + 0.1);
                    const px = pos.x + (Math.random() - 0.5) * currentMaxWidth;
                    const py = (pos.y - candleHeight) - (t * flameHeight);
                    
                    // 火焰核心亮黄色，外围呈霓虹橙红，极具层次感
                    const color = t < 0.7 && Math.random() > 0.35 ? '#ffe600' : '#ff4500';
                    particles.push(new Particle(px, py, color, 'flame'));
                }
            });
        }

        function adjustColorBrightness(hex, percent) {
            let R = parseInt(hex.substring(1,3),16);
            let G = parseInt(hex.substring(3,5),16);
            let B = parseInt(hex.substring(5,7),16);
            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);
            R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
            let rHex = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            let gHex = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            let bHex = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
            return "#"+rHex+gHex+bHex;
        }

        function animate() {
            ctx.fillStyle = 'rgba(6, 1, 10, 0.25)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';

            if (state === 'BLOWING') {
                blowTimer++;
                if (blowTimer > 90) { 
                    state = 'EXTINGUISHED';
                    resetBtn.style.display = 'block';   
                }
            }

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        function startAudioListening() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.4; 
                analyser.fftSize = 512;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    if (state !== 'LISTENING') return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;

                    // 只能通过麦克风高强度声学吹气触发，杜绝任何屏幕误触
                    if (average > BLOW_THRESHOLD) {
                        state = 'BLOWING';
                        blowTimer = 0;
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            })
            .catch(err => {
                console.warn("麦克风不可用:", err);
            });
        }

        // 点击激活按钮：展示标题并开始聆听麦克风
        wishBtn.addEventListener('click', () => {
            wishBtn.style.display = 'none';
            headerBlock.classList.add('show'); // 优雅淡入显示大标题和副标题
            state = 'LISTENING';
            startAudioListening();
        });

        // 重新点亮按钮：恢复初始无标题等待状态
        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            headerBlock.classList.remove('show'); // 隐藏标题
            wishBtn.style.display = 'block';
            state = 'WAITING';
            generateCakeParticles(); // 重新生成复原火焰
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
