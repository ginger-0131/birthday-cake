<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Particle Dream Cake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06010a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 40px 20px;
            -webkit-user-select: none;
            user-select: none;
        }
        .header {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            max-width: 90vw;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }
        .header.show {
            opacity: 1;
            transform: translateY(0);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #ebd2ff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(235, 210, 255, 0.4);
            line-height: 1.3;
        }
        .header p {
            color: #928b9c;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            z-index: 10;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            background: linear-gradient(135deg, #c37fff, #7b53cc);
            border: none;
            color: white;
            padding: 14px 45px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(123, 83, 204, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn.reset-btn {
            background: linear-gradient(135deg, #7ad2f0, #4facfe);
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4);
        }
        @media (min-width: 768px) {
            .header h1 { font-size: 2.4rem; }
            .header p { font-size: 1.1rem; }
            .btn { padding: 16px 50px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="header" id="headerBlock">
        <h1>Cheers to another beautiful year!</h1>
        <p>Make a wish and blow out the candles. 🟟</p>
    </div>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="wishBtn">✨ Tap Me!</button>
        <button class="btn reset-btn" id="resetBtn" style="display: none;">🟟 Light Again</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const wishBtn = document.getElementById('wishBtn');
        const resetBtn = document.getElementById('resetBtn');
        const headerBlock = document.getElementById('headerBlock');

        let width, height, scaleFactor;
        let particles = [];
        let state = 'WAITING'; 
        let blowTimer = 0;
        
        let angleY = 0; 
        let isDragging = false;
        let previousX = 0;
        let velocityX = 0; 

        const BLOW_THRESHOLD = 75; 
        const PITCH = 0.10; 

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function interpolateColor(color1, color2, factor) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * factor);
            const g = Math.round(c1.g + (c2.g - c1.g) * factor);
            const b = Math.round(c1.b + (c2.b - c1.b) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        class Particle {
            constructor(localX, localY, localZ, color, type, flameHeightRatio = 0) {
                this.localX = localX;
                this.localY = localY;
                this.localZ = localZ;
                
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                this.color = color;
                this.type = type; 
                this.flameHeightRatio = flameHeightRatio; // 火焰粒子专属高度比，用于计算动态摇曳
                
                const sizeScale = scaleFactor < 1 ? scaleFactor * 1.1 : 1;
                if (type === 'flame') {
                    this.baseSize = (Math.random() * 1.3 + 1.1) * sizeScale;
                } else {
                    this.baseSize = (Math.random() * 0.8 + 0.45) * sizeScale; 
                }
                this.size = this.baseSize;

                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 0.04 + 0.02;
                this.friction = 0.88;
                this.baseAlpha = Math.random() * 0.35 + 0.55;
                this.alpha = this.baseAlpha;

                this.smokeVx = (Math.random() - 0.5) * 18; 
                this.smokeVy = -Math.random() * 6 - 4;     
                this.flamePhase = Math.random() * 100;
            }

            update(centerX, centerY) {
                if (state === 'WAITING' || state === 'LISTENING') {
                    let x1 = this.localX;
                    let z1 = this.localZ;
                    let y1 = this.localY;

                    // 【核心改动】烛火流体波动方程：越往顶部（ratio接近1），摇曳幅度越大，形成丝滑波浪感
                    if (this.type === 'flame') {
                        const time = Date.now() * 0.007 + this.flamePhase;
                        // 纵向波浪相移 + 随高度放大的正弦波动
                        const swing = Math.sin(time + this.flameHeightRatio * 3.5) * 2.2 * this.flameHeightRatio * scaleFactor;
                        x1 += swing;
                        // 增加微弱的前后纵深摇摆
                        z1 += Math.cos(time * 0.8 + this.flameHeightRatio * 2) * 1.0 * this.flameHeightRatio * scaleFactor;
                    }

                    // 绕Y轴进行旋转变换
                    const cosY = Math.cos(angleY);
                    const sinY = Math.sin(angleY);
                    let rx1 = x1 * cosY - z1 * sinY;
                    let rz1 = x1 * sinY + z1 * cosY;

                    // 俯视矩阵变换
                    const cosP = Math.cos(PITCH);
                    const sinP = Math.sin(PITCH);
                    let rx = rx1;
                    let ry = y1 * cosP - rz1 * sinP;
                    let rz = y1 * sinP + rz1 * cosP;

                    const distance = 360 * scaleFactor;
                    const projection = distance / (distance + rz);
                    
                    const targetScreenX = centerX + rx * projection;
                    const targetScreenY = (centerY + 40 * scaleFactor) + ry * projection;

                    let dx = targetScreenX - this.x;
                    let dy = targetScreenY - this.y;
                    
                    this.vx += dx * this.speed;
                    this.vy += dy * this.speed;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;

                    this.size = this.baseSize * projection;
                    
                    if (this.type === 'flame') {
                        // 烛火高频微颤
                        const flicker = Math.sin(Date.now() * 0.04 + this.flamePhase) * 0.08;
                        this.alpha = (this.baseAlpha + flicker) * projection;
                    } else {
                        this.alpha = this.baseAlpha * projection;
                    }

                } else if (state === 'BLOWING' || state === 'EXTINGUISHED') {
                    if (this.type === 'flame') {
                        this.x += this.smokeVx;
                        this.y += this.smokeVy;
                        this.smokeVx *= 0.93; 
                        this.smokeVy *= 0.93;
                        this.alpha -= 0.015; 
                        if (this.alpha < 0) this.alpha = 0;
                    } else {
                        const cosY = Math.cos(angleY);
                        const sinY = Math.sin(angleY);
                        let x1 = this.localX * cosY - this.localZ * sinY;
                        let z1 = this.localX * sinY + this.localZ * cosY;
                        const cosP = Math.cos(PITCH);
                        const sinP = Math.sin(PITCH);
                        let rx = x1;
                        let ry = this.localY * cosP - z1 * sinP;
                        let rz = this.localY * sinP + z1 * cosP;
                        
                        const distance = 360 * scaleFactor;
                        const projection = distance / (distance + rz);
                        
                        let dx = (centerX + rx * projection) - this.x;
                        let dy = ((centerY + 40 * scaleFactor) + ry * projection) - this.y;
                        this.vx += dx * this.speed;
                        this.vy += dy * this.speed;
                        this.x += this.vx * this.friction;
                        this.y += this.vy * this.friction;
                        this.alpha = this.baseAlpha * projection * 0.4; 
                    }
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            const minDim = Math.min(width, height);
            scaleFactor = width < 500 ? minDim / 350 : minDim / 550; 

            generateCakeParticles();
        }

        // 【算法深度重构】精细化建模 + 低饱和度优雅莫兰迪色系渐变
        function generateCakeParticles() {
            particles = [];

            // 优化方案：采用低饱和度、略带灰色调的高级柔和色彩体系
            const layers = [
                { rX: 125 * scaleFactor, h: 54 * scaleFactor, bottomColor: '#9378a6', topColor: '#f3ebf7' }, // 灰优雅紫 ➡️ 柔白
                { rX: 92 * scaleFactor,  h: 46 * scaleFactor, bottomColor: '#b57c96', topColor: '#fcedf3' }, // 莫兰迪粉 ➡️ 浅白粉
                { rX: 62 * scaleFactor,  h: 38 * scaleFactor, bottomColor: '#7a85a3', topColor: '#edf1f7' }  // 雾霾静谧蓝 ➡️ 冰白
            ];

            let currentBaseY = 110 * scaleFactor; 

            layers.forEach((layer) => {
                // 1. 渲染圆柱的“侧表面外壳”
                const sideCount = Math.floor(layer.rX * 26); 
                for (let i = 0; i < sideCount; i++) {
                    const angle = (i / sideCount) * Math.PI * 2;
                    const lh = Math.random() * layer.h;
                    
                    const lx = Math.cos(angle) * layer.rX;
                    const lz = Math.sin(angle) * layer.rX;
                    const ly = currentBaseY - lh;

                    // 换回每层独立渐变，确保各层轮廓清晰
                    const colorFactor = lh / layer.h;
                    let color = interpolateColor(layer.bottomColor, layer.topColor, colorFactor);
                    
                    if (Math.cos(angle) > 0.65 && Math.random() > 0.5) color = '#ffffff';

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }

                // 2. 渲染圆柱顶部的“圆盘盖子表面”
                const topCount = Math.floor(layer.rX * layer.rX * 0.18);
                for (let i = 0; i < topCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const randR = Math.sqrt(Math.random()); 
                    const curR = layer.rX * randR;

                    const lx = Math.cos(angle) * curR;
                    const lz = Math.sin(angle) * curR;
                    const ly = currentBaseY - layer.h;

                    let color = layer.topColor;
                    if (Math.cos(angle) > 0.6 && Math.random() > 0.4) color = '#ffffff';

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }

                currentBaseY -= (layer.h - 4 * scaleFactor);
            });

            // 3. 【彻底重构】5根蜡烛：严格采用圆柱表面建模，彻底解决“被啃过”的毛刺缺陷
            const candleRadius = 34 * scaleFactor;
            const candlePositions = [];
            const candleCount = 5; 
            for (let i = 0; i < candleCount; i++) {
                const angle = (i * Math.PI * 2) / candleCount; 
                candlePositions.push({
                    x: Math.cos(angle) * candleRadius,
                    z: Math.sin(angle) * candleRadius,
                    y: currentBaseY
                });
            }

            candlePositions.forEach(pos => {
                const candleWidth = 6.0 * scaleFactor; 
                const candleHeight = 52 * scaleFactor; 
                
                // A. 蜡烛圆柱侧面外壳：粒子强制均匀排列在圆柱表面
                const cSideCount = 55; // 绕圆柱周长圈数
                const cHeightLayers = 25; // 纵向层数
                for (let h = 0; h < cHeightLayers; h++) {
                    const lh = (h / cHeightLayers) * candleHeight;
                    const ly = pos.y - lh;
                    for (let s = 0; s < cSideCount; s++) {
                        const cAngle = (s / cSideCount) * Math.PI * 2;
                        const lx = pos.x + Math.cos(cAngle) * candleWidth;
                        const lz = pos.z + Math.sin(cAngle) * candleWidth;
                        
                        // 采用带有优雅暗纹的浅柔灰色/冰白色组合，表现立体石膏感
                        const color = Math.cos(cAngle) > 0.4 ? '#ffffff' : '#dcd7e3';
                        particles.push(new Particle(lx, ly, lz, color, 'candle'));
                    }
                }
                
                // B. 蜡烛圆柱顶部封盖：确保顶部边缘圆润无缺陷
                const cTopCount = 40;
                for(let i=0; i<cTopCount; i++) {
                    const cAngle = Math.random() * Math.PI * 2;
                    const cR = Math.sqrt(Math.random()) * candleWidth;
                    const lx = pos.x + Math.cos(cAngle) * cR;
                    const lz = pos.z + Math.sin(cAngle) * cR;
                    particles.push(new Particle(lx, pos.y - candleHeight, lz, '#ffffff', 'candle'));
                }
                
                // C. 【重新建模】高挺尖细、波浪摇曳的烛光火焰
                const flameHeight = 22 * scaleFactor; // 火苗拉高
                const maxFlameWidth = 6.5 * scaleFactor;
                const flameParticlesCount = 180;
                
                for (let i = 0; i < flameParticlesCount; i++) {
                    const t = Math.random(); // 从底到顶的归一化比重 (0=底部, 1=最顶尖)
                    
                    // 【关键数学公式改动】使用指数和正弦复合包络：越到顶部收缩速度越急剧，形成极为尖细的火尖
                    const envelope = Math.pow(Math.sin(t * Math.PI * 0.65), 1.5) * (1 - t);
                    const currentMaxWidth = maxFlameWidth * envelope;
                    
                    const fAngle = Math.random() * Math.PI * 2;
                    const fR = Math.random() * currentMaxWidth;
                    
                    const lx = pos.x + Math.cos(fAngle) * fR;
                    const lz = pos.z + Math.sin(fAngle) * fR;
                    const ly = (pos.y - candleHeight) - (t * flameHeight);
                    
                    // 渐变火苗色调：底部微弱浅蓝高亮，中心金黄，顶部尖端呈飘逸暗橘红
                    let color = '#ffe853';
                    if (t > 0.7) {
                        color = '#ff5100'; // 尖端火红
                    } else if (t < 0.15) {
                        color = '#64d2ff'; // 灯芯底部幽蓝
                    }
                    
                    // 传入第三个参数 t，让其在 update 内触发节奏性动态摇曳
                    particles.push(new Particle(lx, ly, lz, color, 'flame', t));
                }
            });
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#06010a';
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalCompositeOperation = 'screen';

            if (!isDragging) {
                angleY += velocityX;
                velocityX *= 0.95; 
                if (Math.abs(velocityX) < 0.005) {
                    velocityX = 0.006; 
                }
            }

            if (state === 'BLOWING') {
                blowTimer++;
                if (blowTimer > 90) { 
                    state = 'EXTINGUISHED';
                    resetBtn.style.display = 'block';   
                }
            }

            const centerX = width / 2;
            const centerY = height * 0.48; 

            particles.forEach(p => {
                p.update(centerX, centerY);
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        function handleStart(clientX) {
            isDragging = true;
            previousX = clientX;
            velocityX = 0;
        }

        function handleMove(clientX) {
            if (!isDragging) return;
            const deltaX = clientX - previousX;
            previousX = clientX;
            angleY += deltaX * 0.008; 
            velocityX = deltaX * 0.008; 
        }

        function handleEnd() {
            isDragging = false;
        }

        window.addEventListener('mousedown', (e) => {
            if(e.target.tagName === 'BUTTON') return; 
            handleStart(e.clientX);
        });
        window.addEventListener('mousemove', (e) => handleMove(e.clientX));
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON') return;
            handleStart(e.touches[0].clientX);
        });
        window.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
        });
        window.addEventListener('touchend', handleEnd);

        function startAudioListening() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.4; 
                analyser.fftSize = 512;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    if (state !== 'LISTENING') return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;

                    if (average > BLOW_THRESHOLD) {
                        state = 'BLOWING';
                        blowTimer = 0;
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            })
            .catch(err => {
                console.warn("麦克风不可用:", err);
            });
        }

        wishBtn.addEventListener('click', () => {
            wishBtn.style.display = 'none';
            headerBlock.classList.add('show'); 
            state = 'LISTENING';
            startAudioListening();
        });

        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            headerBlock.classList.remove('show'); 
            wishBtn.style.display = 'block';
            state = 'WAITING';
            generateCakeParticles(); 
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
