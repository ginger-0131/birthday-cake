<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Particle Dream Cake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06010a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 30px 15px;
            -webkit-user-select: none;
            user-select: none;
        }
        .header {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            max-width: 90vw;
            margin-top: 25px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }
        .header.show {
            opacity: 1;
            transform: translateY(0);
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #ebd2ff;
            text-shadow: 0 0 20px rgba(235, 210, 255, 0.4);
            line-height: 1.4;
        }
        .header p {
            color: #928b9c;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            margin-top: 35px; /* 让副标题往下移，离大标题更远，离蛋糕更近 */
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            z-index: 10;
            margin-bottom: 90px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            background: transparent;
            border: 2px dashed rgba(195, 127, 255, 0.45); 
            color: #ebd2ff;
            padding: 13px 45px;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(123, 83, 204, 0.08);
            margin-top: 20px;
            backdrop-filter: blur(4px);
            opacity: 0; 
            pointer-events: none;
            transition: opacity 1.2s ease, border-color 0.4s ease, box-shadow 0.4s ease, transform 0.2s ease;
        }
        .btn.ready-to-tap {
            opacity: 1;
            pointer-events: auto;
        }
        .btn:hover {
            border-color: rgba(195, 127, 255, 0.9);
            box-shadow: 0 0 25px rgba(123, 83, 204, 0.25);
            background: rgba(195, 127, 255, 0.05);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn.reset-btn {
            border-color: rgba(122, 210, 240, 0.5);
            color: #cbeeff;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.1);
        }
        .btn.reset-btn:hover {
            border-color: rgba(122, 210, 240, 0.9);
            background: rgba(79, 172, 254, 0.05);
        }
        @media (min-width: 768px) {
            .header h1 { font-size: 2.1rem; }
            .btn { padding: 15px 50px; font-size: 1.05rem; }
            .controls { margin-bottom: 110px; }
        }
    </style>
</head>
<body>

    <div class="header" id="headerBlock">
        <h1>Cheers to another<br>beautiful year!</h1>
        <p>Make a wish and blow out the candles. 💨</p>
    </div>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="wishBtn">✨ Tap Me</button>
        <button class="btn reset-btn" id="resetBtn" style="display: none;">🔥 Light Again</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const wishBtn = document.getElementById('wishBtn');
        const resetBtn = document.getElementById('resetBtn');
        const headerBlock = document.getElementById('headerBlock');

        let width, height, scaleFactor;
        let particles = [];
        let state = 'WAITING'; 
        let blowTimer = 0;
        let spawnTicks = 0; 
        
        let angleY = 0;
        let isDragging = false;
        let previousX = 0;
        let velocityX = 0; 

        const BLOW_THRESHOLD = 75; 
        const PITCH = 0.26;

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function interpolateColor(color1, color2, factor) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * factor);
            const g = Math.round(c1.g + (c2.g - c1.g) * factor);
            const b = Math.round(c1.b + (c2.b - c1.b) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        class Particle {
            constructor(localX, localY, localZ, color, type, flameHeightRatio = 0) {
                this.localX = localX;
                this.localY = localY;
                this.localZ = localZ;
                
                const spawnRadius = Math.max(window.innerWidth, window.innerHeight) * 1.3;
                const spawnAngle = Math.random() * Math.PI * 2;
                this.x = window.innerWidth / 2 + Math.cos(spawnAngle) * spawnRadius * (Math.random() * 0.3 + 0.85);
                this.y = window.innerHeight / 2 + Math.sin(spawnAngle) * spawnRadius * (Math.random() * 0.3 + 0.85);
                
                this.color = color;
                this.type = type; 
                this.flameHeightRatio = flameHeightRatio; 
                
                const sizeScale = scaleFactor < 1 ? scaleFactor * 1.1 : 1;
                if (type === 'flame') {
                    this.baseSize = (Math.random() * 1.3 + 1.1) * sizeScale;
                } else if (type === 'text') {
                    this.baseSize = (Math.random() * 0.55 + 0.6) * sizeScale;
                } else {
                    this.baseSize = (Math.random() * 0.75 + 0.45) * sizeScale;
                }
                this.size = this.baseSize;
                this.vx = 0;
                this.vy = 0;
                this.baseSpeed = Math.random() * 0.018 + 0.026; 
                this.friction = 0.79;
                this.baseAlpha = type === 'text' ? (Math.random() * 0.2 + 0.75) : (Math.random() * 0.35 + 0.55);
                this.alpha = this.baseAlpha;
                this.smokeVx = (Math.random() - 0.5) * 18; 
                this.smokeVy = -Math.random() * 6 - 4;     
                this.flamePhase = Math.random() * 100;
            }

            update(centerX, centerY) {
                if (state === 'WAITING' || state === 'LISTENING' || state === 'BLOWING' || state === 'EXTINGUISHED') {
                    let targetScreenX, targetScreenY, projection = 1;
                    if (this.type === 'text') {
                        targetScreenX = centerX + this.localX;
                        targetScreenY = centerY + this.localY;
                        this.size = this.baseSize;
                        if (state !== 'WAITING') {
                            this.alpha -= 0.04;
                        }
                    } else {
                        let x1 = this.localX;
                        let z1 = this.localZ;
                        let y1 = this.localY;

                        if (this.type === 'flame') {
                            const time = Date.now() * 0.008 + this.flamePhase;
                            const swing = Math.sin(time + this.flameHeightRatio * 3.2) * 2.5 * this.flameHeightRatio * scaleFactor;
                            x1 += swing;
                            z1 += Math.cos(time * 0.9 + this.flameHeightRatio * 2.5) * 1.2 * this.flameHeightRatio * scaleFactor;
                        }

                        const cosY = Math.cos(angleY);
                        const sinY = Math.sin(angleY);
                        let rx1 = x1 * cosY - z1 * sinY;
                        let rz1 = x1 * sinY + z1 * cosY;

                        const cosP = Math.cos(PITCH);
                        const sinP = Math.sin(PITCH);
                        let rx = rx1;
                        let ry = y1 * cosP - rz1 * sinP;
                        let rz = y1 * sinP + rz1 * cosP;

                        const distance = 300 * scaleFactor;
                        projection = distance / (distance + rz);
                        
                        targetScreenX = centerX + rx * projection;
                        targetScreenY = centerY + ry * projection;
                    }

                    if (state === 'WAITING' || state === 'LISTENING') {
                        let dx = targetScreenX - this.x;
                        let dy = targetScreenY - this.y;
            
                        if (spawnTicks < 180) {
                             this.vx += (Math.random() - 0.5) * 0.04;
                             this.vy += (Math.random() - 0.5) * 0.04;
                             this.vx *= 0.98;
                             this.vy *= 0.98;
                        } else {
                             let currentSpeed = this.baseSpeed * 0.25;
                             this.vx += dx * currentSpeed;
                             this.vy += dy * currentSpeed;
                             this.vx *= this.friction;
                             this.vy *= this.friction;
                        }
             
                        this.x += this.vx;
                        this.y += this.vy;
                        if (this.type !== 'text') {
                            this.size = this.baseSize * projection;
                            if (this.type === 'flame') {
                                const flicker = Math.sin(Date.now() * 0.05 + this.flamePhase) * 0.08;
                                let borderFade = 1.0 - (this.flameHeightRatio * 0.25);
                                this.alpha = (this.baseAlpha + flicker) * projection * borderFade;
                            } else {
                               this.alpha = this.baseAlpha * projection;
                            }
                        }
                    } else {
                        if (this.type === 'flame') {
                            this.x += this.smokeVx;
                            this.y += this.smokeVy;
                            this.smokeVx *= 0.93; 
                            this.smokeVy *= 0.93;
                            this.alpha -= 0.015;
                        } else if (this.type === 'text') {
                            this.alpha -= 0.04;
                        } else {
                            let dx = targetScreenX - this.x;
                            let dy = targetScreenY - this.y;
                            this.vx += dx * this.baseSpeed;
                            this.vy += dy * this.baseSpeed;
                            this.x += this.vx * this.friction;
                            this.y += this.vy * this.friction;
                            this.alpha = this.baseAlpha * projection * 0.4;
                        }
                    }
                    if (this.alpha < 0) this.alpha = 0;
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            const minDim = Math.min(width, height);
            scaleFactor = width < 500 ? minDim / 360 : minDim / 550; 

            generateCakeParticles();
        }

        function getTextPoints(text, fontSize) {
            const memCanvas = document.createElement('canvas');
            const memCtx = memCanvas.getContext('2d');
            
            const maxWidth = Math.min(680, window.innerWidth * 0.92 / (0.42 * scaleFactor));
            memCanvas.width = maxWidth;
            memCanvas.height = 130;
            
            memCtx.fillStyle = '#000';
            memCtx.fillRect(0, 0, memCanvas.width, memCanvas.height);
            
            memCtx.fillStyle = '#fff';
            const safeFontSize = window.innerWidth < 380 ? Math.floor(fontSize * 0.85) : fontSize;
            memCtx.font = `bold ${safeFontSize}px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif`;
            memCtx.textAlign = 'center';
            memCtx.textBaseline = 'middle';
            memCtx.fillText(text, memCanvas.width / 2, memCanvas.height / 2);
            
            const imgData = memCtx.getImageData(0, 0, memCanvas.width, memCanvas.height);
            const points = [];
            const step = window.innerWidth < 500 ? 3 : 2;
            for (let y = 0; y < memCanvas.height; y += step) {
                for (let x = 0; x < memCanvas.width; x += step) {
                    const idx = (y * memCanvas.width + x) * 4;
                    if (imgData.data[idx] > 128) {
                        points.push({
                            lx: (x - memCanvas.width / 2),
                            ly: (y - memCanvas.height / 2)
                        });
                    }
                }
            }
            return points;
        }

        function generateCakeParticles() {
            particles = [];
            spawnTicks = 0; 
            wishBtn.classList.remove('ready-to-tap'); 

            const textFontSize = Math.floor(66 * scaleFactor); 
            const textPoints = getTextPoints("HAPPY BIRTHDAY", textFontSize);
            textPoints.forEach(pt => {
                const lx = pt.lx * 0.42 * scaleFactor;
                const ly = -165 * scaleFactor + pt.ly * 0.42 * scaleFactor; 
                
                const color = interpolateColor('#e8d3fc', '#f7d3e6', Math.random());
                particles.push(new Particle(lx, ly, 0, color, 'text'));
            });

            const layers = [
                { rX: 125 * scaleFactor, h: 46 * scaleFactor, bottomColor: '#6c3b8f', topColor: '#dfc2f2' }, 
                { rX: 95 * scaleFactor,  h: 43 * scaleFactor, bottomColor: '#9e4776', topColor: '#f7d3e6' }, 
                { rX: 65 * scaleFactor,  h: 39 * scaleFactor, bottomColor: '#4f5d85', topColor: '#d6e0f5' }  
            ];
            let currentBaseY = 95 * scaleFactor; 

            layers.forEach((layer) => {
                const sideCount = Math.floor(layer.rX * 24); 
                for (let i = 0; i < sideCount; i++) {
                    const angle = (i / sideCount) * Math.PI * 2;
                    const lh = Math.random() * layer.h;
                    
                    const lx = Math.cos(angle) * layer.rX;
                    const lz = Math.sin(angle) * layer.rX;
                    const ly = currentBaseY - lh;

                    const colorFactor = lh / layer.h;
                    let color = interpolateColor(layer.bottomColor, layer.topColor, colorFactor);
                    if (Math.cos(angle) > 0.75 && Math.random() > 0.8) color = '#ffffff';

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }

                const topCount = Math.floor(layer.rX * layer.rX * 0.16);
                for (let i = 0; i < topCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const randR = Math.sqrt(Math.random()); 
                    const curR = layer.rX * randR;

                    const lx = Math.cos(angle) * curR;
                    const lz = Math.sin(angle) * curR;
                    const ly = currentBaseY - layer.h;

                    let color = interpolateColor(layer.bottomColor, layer.topColor, 0.72);
                    if (Math.cos(angle) > 0.6 && Math.random() > 0.65) color = '#ffffff';

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }
                currentBaseY -= (layer.h - 4 * scaleFactor);
            });

            const candleRadius = 38 * scaleFactor;
            const candlePositions = [];
            const candleCount = 6; 
            for (let i = 0; i < candleCount; i++) {
                const angle = (i * Math.PI * 2) / candleCount;
                candlePositions.push({
                    x: Math.cos(angle) * candleRadius,
                    z: Math.sin(angle) * candleRadius,
                    y: currentBaseY
                });
            }

            const goldColor1 = '#f7db8c'; 
            const goldColor2 = '#dca94a';
            candlePositions.forEach(pos => {
                const candleWidth = 3.2 * scaleFactor; 
                const candleHeight = 34 * scaleFactor; 
                
                const cSideCount = 28; 
                const cHeightLayers = 15; 
                for (let h = 0; h < cHeightLayers; h++) {
                    const lh = (h / cHeightLayers) * candleHeight;
                    const ly = pos.y - lh;
                    for (let s = 0; s < cSideCount; s++) {
                        const cAngle = (s / cSideCount) * Math.PI * 2;
                        const lx = pos.x + Math.cos(cAngle) * candleWidth;
                        const lz = pos.z + Math.sin(cAngle) * candleWidth;
                        
                        const factor = (Math.cos(cAngle) + 1) / 2;
                        const color = interpolateColor(goldColor2, goldColor1, factor);
                        particles.push(new Particle(lx, ly, lz, color, 'candle'));
                    }
                }
                
                const cTopCount = 12;
                for(let i=0; i<cTopCount; i++) {
                    const cAngle = Math.random() * Math.PI * 2;
                    const cR = Math.sqrt(Math.random()) * candleWidth;
                    const lx = pos.x + Math.cos(cAngle) * cR;
                    const lz = pos.z + Math.sin(cAngle) * cR;
                    particles.push(new Particle(lx, pos.y - candleHeight, lz, goldColor1, 'candle'));
                }
                
                const flameHeight = 15 * scaleFactor;
                const maxFlameWidth = 11.0 * scaleFactor; 
                const flameParticlesCount = 170;
                for (let i = 0; i < flameParticlesCount; i++) {
                    const t = Math.random();
                    const envelope = Math.sin(t * Math.PI * 0.9) * (1 - t * 0.72);
                    const fAngle = Math.random() * Math.PI * 2;
                    const randR = Math.pow(Math.random(), 1.3);
                    const currentRadius = maxFlameWidth * envelope * randR;
                    
                    const lx = pos.x + Math.cos(fAngle) * currentRadius;
                    const lz = pos.z + Math.sin(fAngle) * currentRadius;
                    const ly = (pos.y - candleHeight) - (t * flameHeight);
                    
                    let color;
                    if (randR < 0.45) {
                        color = interpolateColor('#ffae00', '#ffe100', randR / 0.45);
                    } else if (randR < 0.8) {
                        color = interpolateColor('#ffe100', '#ff5100', (randR - 0.45) / 0.35);
                    } else {
                        color = interpolateColor('#ff5100', '#ff1100', (randR - 0.8) / 0.2);
                    }
                    
                    particles.push(new Particle(lx, ly, lz, color, 'flame', t));
                }
            });
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#06010a';
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalCompositeOperation = 'screen';

            spawnTicks++;
            if (!isDragging) {
                if (spawnTicks > 300) {  
                    angleY += velocityX;
                    velocityX *= 0.95; 
                    if (Math.abs(velocityX) < 0.004) {
                        velocityX = 0.004;
                    }
                } else {
                    angleY = 0;
                    velocityX = 0;
                }
            }

            if (spawnTicks === 510 && state === 'WAITING') {
                wishBtn.classList.add('ready-to-tap');
            }

            if (state === 'BLOWING') {
                blowTimer++;
                if (blowTimer > 90) { 
                    state = 'EXTINGUISHED';
                    resetBtn.style.display = 'block';   
                    setTimeout(() => resetBtn.classList.add('ready-to-tap'), 50);
                }
            }

            const centerX = width / 2;
            const centerY = height * 0.41; 

            particles = particles.filter(p => p.type !== 'text' || p.alpha > 0);
            particles.forEach(p => {
                p.update(centerX, centerY);
                p.draw();
            });
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        function handleStart(clientX) {
            if (spawnTicks < 300) return;
            isDragging = true;
            previousX = clientX;
            velocityX = 0;
        }

        function handleMove(clientX) {
            if (!isDragging) return;
            const deltaX = clientX - previousX;
            previousX = clientX;
            angleY += deltaX * 0.008; 
            velocityX = deltaX * 0.008;
        }

        function handleEnd() {
            isDragging = false;
        }

        window.addEventListener('mousedown', (e) => {
            if(e.target.tagName === 'BUTTON') return; 
            handleStart(e.clientX);
        });
        window.addEventListener('mousemove', (e) => handleMove(e.clientX));
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON') return;
            handleStart(e.touches[0].clientX);
        });
        window.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
        });
        window.addEventListener('touchend', handleEnd);

        function startAudioListening() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.4; 
                analyser.fftSize = 512;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    if (state !== 'LISTENING') return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;
                    if (average > BLOW_THRESHOLD) {
                        state = 'BLOWING';
                        blowTimer = 0;
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            })
            .catch(err => {
                console.warn("麦克风不可用:", err);
            });
        }

        wishBtn.addEventListener('click', () => {
            wishBtn.classList.remove('ready-to-tap');
            setTimeout(() => { wishBtn.style.display = 'none'; }, 400);
            headerBlock.classList.add('show'); 
            state = 'LISTENING';
            startAudioListening();
        });
        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            resetBtn.classList.remove('ready-to-tap');
            headerBlock.classList.remove('show'); 
            wishBtn.style.display = 'block';
            state = 'WAITING';
            generateCakeParticles(); 
        });
        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
