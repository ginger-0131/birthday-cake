<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Particle Dream Cake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06010a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 40px 20px;
            -webkit-user-select: none;
            user-select: none;
        }
        .header {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            max-width: 90vw;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }
        .header.show {
            opacity: 1;
            transform: translateY(0);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #ebd2ff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(235, 210, 255, 0.4);
            line-height: 1.3;
        }
        .header p {
            color: #928b9c;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            z-index: 10;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            background: linear-gradient(135deg, #c37fff, #7b53cc);
            border: none;
            color: white;
            padding: 14px 45px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(123, 83, 204, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn.reset-btn {
            background: linear-gradient(135deg, #7ad2f0, #4facfe);
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4);
        }
        @media (min-width: 768px) {
            .header h1 { font-size: 2.4rem; }
            .header p { font-size: 1.1rem; }
            .btn { padding: 16px 50px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="header" id="headerBlock">
        <h1>Cheers to another beautiful year!</h1>
        <p>Make a wish and blow out the candles. 💨</p>
    </div>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="wishBtn">✨ Tap Me!</button>
        <button class="btn reset-btn" id="resetBtn" style="display: none;">🔥 Light Again</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const wishBtn = document.getElementById('wishBtn');
        const resetBtn = document.getElementById('resetBtn');
        const headerBlock = document.getElementById('headerBlock');

        let width, height, scaleFactor;
        let particles = [];
        let state = 'WAITING'; 
        let blowTimer = 0;
        
        let angleY = 0; 
        let isDragging = false;
        let previousX = 0;
        let velocityX = 0; 

        const BLOW_THRESHOLD = 75; 
        
        // 【微调】进一步加大俯视夹角（由0.16调至0.22），增强顶面圆形层次和空间立体透视
        const PITCH = 0.22; 

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function interpolateColor(color1, color2, factor) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * factor);
            const g = Math.round(c1.g + (c2.g - c1.g) * factor);
            const b = Math.round(c1.b + (c2.b - c1.b) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        class Particle {
            constructor(localX, localY, localZ, color, type, flameHeightRatio = 0) {
                this.localX = localX;
                this.localY = localY;
                this.localZ = localZ;
                
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                this.color = color;
                this.type = type; 
                this.flameHeightRatio = flameHeightRatio; 
                
                const sizeScale = scaleFactor < 1 ? scaleFactor * 1.1 : 1;
                if (type === 'flame') {
                    this.baseSize = (Math.random() * 1.5 + 1.2) * sizeScale;
                } else {
                    this.baseSize = (Math.random() * 0.8 + 0.45) * sizeScale; 
                }
                this.size = this.baseSize;

                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 0.05 + 0.07; 
                this.friction = 0.82; 
                
                this.baseAlpha = Math.random() * 0.35 + 0.55;
                this.alpha = this.baseAlpha;

                this.smokeVx = (Math.random() - 0.5) * 18; 
                this.smokeVy = -Math.random() * 6 - 4;     
                this.flamePhase = Math.random() * 100;
            }

            update(centerX, centerY) {
                if (state === 'WAITING' || state === 'LISTENING') {
                    let x1 = this.localX;
                    let z1 = this.localZ;
                    let y1 = this.localY;

                    if (this.type === 'flame') {
                        const time = Date.now() * 0.008 + this.flamePhase;
                        // 稍许加大摆动幅度，呈现灵动的烛火感
                        const swing = Math.sin(time + this.flameHeightRatio * 3.2) * 2.8 * this.flameHeightRatio * scaleFactor;
                        x1 += swing;
                        z1 += Math.cos(time * 0.9 + this.flameHeightRatio * 2.5) * 1.4 * this.flameHeightRatio * scaleFactor;
                    }

                    const cosY = Math.cos(angleY);
                    const sinY = Math.sin(angleY);
                    let rx1 = x1 * cosY - z1 * sinY;
                    let rz1 = x1 * sinY + z1 * cosY;

                    const cosP = Math.cos(PITCH);
                    const sinP = Math.sin(PITCH);
                    let rx = rx1;
                    let ry = y1 * cosP - rz1 * sinP;
                    let rz = y1 * sinP + rz1 * cosP;

                    const distance = 360 * scaleFactor;
                    const projection = distance / (distance + rz);
                    
                    const targetScreenX = centerX + rx * projection;
                    const targetScreenY = (centerY + 30 * scaleFactor) + ry * projection;

                    let dx = targetScreenX - this.x;
                    let dy = targetScreenY - this.y;
                    
                    this.vx += dx * this.speed;
                    this.vy += dy * this.speed;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;

                    this.size = this.baseSize * projection;
                    
                    if (this.type === 'flame') {
                        const flicker = Math.sin(Date.now() * 0.05 + this.flamePhase) * 0.08;
                        this.alpha = (this.baseAlpha + flicker) * projection;
                    } else {
                        this.alpha = this.baseAlpha * projection;
                    }

                } else if (state === 'BLOWING' || state === 'EXTINGUISHED') {
                    if (this.type === 'flame') {
                        this.x += this.smokeVx;
                        this.y += this.smokeVy;
                        this.smokeVx *= 0.93; 
                        this.smokeVy *= 0.93;
                        this.alpha -= 0.015; 
                        if (this.alpha < 0) this.alpha = 0;
                    } else {
                        const cosY = Math.cos(angleY);
                        const sinY = Math.sin(angleY);
                        let x1 = this.localX * cosY - this.localZ * sinY;
                        let z1 = this.localX * sinY + this.localZ * cosY;
                        const cosP = Math.cos(PITCH);
                        const sinP = Math.sin(PITCH);
                        let rx = x1;
                        let ry = this.localY * cosP - z1 * sinP;
                        let rz = this.localY * sinP + z1 * cosP;
                        
                        const distance = 360 * scaleFactor;
                        const projection = distance / (distance + rz);
                        
                        let dx = (centerX + rx * projection) - this.x;
                        let dy = ((centerY + 30 * scaleFactor) + ry * projection) - this.y;
                        this.vx += dx * this.speed;
                        this.vy += dy * this.speed;
                        this.x += this.vx * this.friction;
                        this.y += this.vy * this.friction;
                        this.alpha = this.baseAlpha * projection * 0.4; 
                    }
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            const minDim = Math.min(width, height);
            scaleFactor = width < 500 ? minDim / 350 : minDim / 550; 

            generateCakeParticles();
        }

        function generateCakeParticles() {
            particles = [];

            // 饱满浓郁的独立分层莫兰迪紫色系
            const layers = [
                { rX: 125 * scaleFactor, h: 54 * scaleFactor, bottomColor: '#6c3b8f', topColor: '#dfc2f2' }, 
                { rX: 92 * scaleFactor,  h: 46 * scaleFactor, bottomColor: '#9e4776', topColor: '#f7d3e6' }, 
                { rX: 62 * scaleFactor,  h: 38 * scaleFactor, bottomColor: '#4f5d85', topColor: '#d6e0f5' }  
            ];

            let currentBaseY = 110 * scaleFactor; 

            layers.forEach((layer) => {
                // 1. 侧表面
                const sideCount = Math.floor(layer.rX * 26); 
                for (let i = 0; i < sideCount; i++) {
                    const angle = (i / sideCount) * Math.PI * 2;
                    const lh = Math.random() * layer.h;
                    
                    const lx = Math.cos(angle) * layer.rX;
                    const lz = Math.sin(angle) * layer.rX;
                    const ly = currentBaseY - lh;

                    const colorFactor = lh / layer.h;
                    let color = interpolateColor(layer.bottomColor, layer.topColor, colorFactor);
                    
                    if (Math.cos(angle) > 0.75 && Math.random() > 0.8) color = '#ffffff';

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }

                // 2. 顶盖面
                const topCount = Math.floor(layer.rX * layer.rX * 0.18);
                for (let i = 0; i < topCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const randR = Math.sqrt(Math.random()); 
                    const curR = layer.rX * randR;

                    const lx = Math.cos(angle) * curR;
                    const lz = Math.sin(angle) * curR;
                    const ly = currentBaseY - layer.h;

                    let color = interpolateColor(layer.bottomColor, layer.topColor, 0.72);
                    if (Math.cos(angle) > 0.6 && Math.random() > 0.65) color = '#ffffff';

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }

                currentBaseY -= (layer.h - 4 * scaleFactor);
            });

            // 3. 【参数优化】完美契合要求的 6 根浅金色细矮圆柱形蜡烛
            const candleRadius = 35 * scaleFactor;
            const candlePositions = [];
            const candleCount = 6; // 【修改】升级为 6 根均匀排布
            for (let i = 0; i < candleCount; i++) {
                const angle = (i * Math.PI * 2) / candleCount; // 精准 60 度等分
                candlePositions.push({
                    x: Math.cos(angle) * candleRadius,
                    z: Math.sin(angle) * candleRadius,
                    y: currentBaseY
                });
            }

            // 设定浅金色渐变色卡组
            const goldColor1 = '#f4e3b1'; // 优雅浅香槟金
            const goldColor2 = '#e5c17d'; // 轻奢柔金

            candlePositions.forEach(pos => {
                const candleWidth = 3.5 * scaleFactor; // 【微调】进一步变细（由4.5调至3.5）
                const candleHeight = 42 * scaleFactor; // 【微调】进一步变矮（由52调至42）
                
                // 蜡烛侧面壳体
                const cSideCount = 35; 
                const cHeightLayers = 20; 
                for (let h = 0; h < cHeightLayers; h++) {
                    const lh = (h / cHeightLayers) * candleHeight;
                    const ly = pos.y - lh;
                    for (let s = 0; s < cSideCount; s++) {
                        const cAngle = (s / cSideCount) * Math.PI * 2;
                        const lx = pos.x + Math.cos(cAngle) * candleWidth;
                        const lz = pos.z + Math.sin(cAngle) * candleWidth;
                        
                        // 混合浅金色调，利用余弦模拟高光和背光阴影
                        const factor = (Math.cos(cAngle) + 1) / 2;
                        const color = interpolateColor(goldColor2, goldColor1, factor);
                        particles.push(new Particle(lx, ly, lz, color, 'candle'));
                    }
                }
                
                // 蜡烛顶盖
                const cTopCount = 20;
                for(let i=0; i<cTopCount; i++) {
                    const cAngle = Math.random() * Math.PI * 2;
                    const cR = Math.sqrt(Math.random()) * candleWidth;
                    const lx = pos.x + Math.cos(cAngle) * cR;
                    const lz = pos.z + Math.sin(cAngle) * cR;
                    particles.push(new Particle(lx, pos.y - candleHeight, lz, goldColor1, 'candle'));
                }
                
                // 4. 【核心重构】纵向短、横向胖、且极度弱化白心的金黄火焰
                const flameHeight = 16 * scaleFactor; // 【微调】纵向变短（由22缩短至16）
                const maxFlameWidth = 10.5 * scaleFactor; // 【微调】横向变胖（由8.5加宽至10.5）
                const flameParticlesCount = 170;
                
                for (let i = 0; i < flameParticlesCount; i++) {
                    const t = Math.random(); 
                    
                    // 修改包络方程：使得火苗整体呈现一个短、圆、丰满的形体
                    const envelope = Math.sin(t * Math.PI * 0.8) * (1 - t * 0.65);
                    
                    const fAngle = Math.random() * Math.PI * 2;
                    const randR = Math.sqrt(Math.random()); 
                    const currentRadius = maxFlameWidth * envelope * randR;
                    
                    const lx = pos.x + Math.cos(fAngle) * currentRadius;
                    const lz = pos.z + Math.sin(fAngle) * currentRadius;
                    const ly = (pos.y - candleHeight) - (t * flameHeight);
                    
                    // 【关键重构】极度压缩白心比例，强化纯粹饱满的金黄色调分布
                    let color;
                    if (randR < 0.08) {
                        // 【微调】大幅缩减白心：只在绝对轴心的极小区域保留一闪而过的亮白核心点
                        color = '#ffffff';
                    } else if (randR < 0.65) {
                        // 核心主体：极为浓郁温暖的柠檬金黄、亮黄色
                        const factor = (randR - 0.08) / 0.57;
                        color = interpolateColor('#ffe647', '#ffcb05', factor);
                    } else {
                        // 外圈：轻盈丝滑的温暖橘红
                        const factor = (randR - 0.65) / 0.35;
                        color = interpolateColor('#ffcb05', '#ff4000', factor);
                    }
                    
                    // 尖端和外围的高空漂逸边缘色修正
                    if (t > 0.75) {
                        color = interpolateColor('#ffcb05', '#ff4d00', (t - 0.75) / 0.25);
                    }
                    
                    particles.push(new Particle(lx, ly, lz, color, 'flame', t));
                }
            });
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#06010a';
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalCompositeOperation = 'screen';

            if (!isDragging) {
                angleY += velocityX;
                velocityX *= 0.95; 
                if (Math.abs(velocityX) < 0.005) {
                    velocityX = 0.006; 
                }
            }

            if (state === 'BLOWING') {
                blowTimer++;
                if (blowTimer > 90) { 
                    state = 'EXTINGUISHED';
                    resetBtn.style.display = 'block';   
                }
            }

            const centerX = width / 2;
            const centerY = height * 0.48; 

            particles.forEach(p => {
                p.update(centerX, centerY);
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        function handleStart(clientX) {
            isDragging = true;
            previousX = clientX;
            velocityX = 0;
        }

        function handleMove(clientX) {
            if (!isDragging) return;
            const deltaX = clientX - previousX;
            previousX = clientX;
            angleY += deltaX * 0.008; 
            velocityX = deltaX * 0.008; 
        }

        function handleEnd() {
            isDragging = false;
        }

        window.addEventListener('mousedown', (e) => {
            if(e.target.tagName === 'BUTTON') return; 
            handleStart(e.clientX);
        });
        window.addEventListener('mousemove', (e) => handleMove(e.clientX));
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON') return;
            handleStart(e.touches[0].clientX);
        });
        window.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
        });
        window.addEventListener('touchend', handleEnd);

        function startAudioListening() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.4; 
                analyser.fftSize = 512;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    if (state !== 'LISTENING') return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;

                    if (average > BLOW_THRESHOLD) {
                        state = 'BLOWING';
                        blowTimer = 0;
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            })
            .catch(err => {
                console.warn("麦克风不可用:", err);
            });
        }

        wishBtn.addEventListener('click', () => {
            wishBtn.style.display = 'none';
            headerBlock.classList.add('show'); 
            state = 'LISTENING';
            startAudioListening();
        });

        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            headerBlock.classList.remove('show'); 
            wishBtn.style.display = 'block';
            state = 'WAITING';
            generateCakeParticles(); 
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
