<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Particle Dream Cake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06010a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 40px 20px;
            -webkit-user-select: none;
            user-select: none;
        }
        .header {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            max-width: 90vw;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }
        .header.show {
            opacity: 1;
            transform: translateY(0);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #f3adff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(243, 173, 255, 0.6);
            line-height: 1.3;
        }
        .header p {
            color: #a59cb0;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            z-index: 10;
            margin-bottom: 50px; /* 增加底部间距 */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            background: linear-gradient(135deg, #da44ff, #892cdc);
            border: none;
            color: white;
            padding: 14px 45px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(137, 44, 220, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 20px; /* 让按钮离蛋糕更远 */
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn.reset-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.5);
        }
        @media (min-width: 768px) {
            .header h1 { font-size: 2.4rem; }
            .header p { font-size: 1.1rem; }
            .btn { padding: 16px 50px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="header" id="headerBlock">
        <h1>Cheers to another beautiful year!</h1>
        <p>Make a wish and blow out the candles. 💨</p>
    </div>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="wishBtn">✨ Tap Me!</button>
        <button class="btn reset-btn" id="resetBtn" style="display: none;">🔥 Light Again</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const wishBtn = document.getElementById('wishBtn');
        const resetBtn = document.getElementById('resetBtn');
        const headerBlock = document.getElementById('headerBlock');

        let width, height, scaleFactor;
        let particles = [];
        let state = 'WAITING'; 
        let blowTimer = 0;
        let angleY = 0; 
        
        const BLOW_THRESHOLD = 75; 

        // 设置俯视透视视角参数 (让三维空间投影带有自然的向下俯视感)
        const PITCH = 0.45; // 绕X轴俯视弧度，决定了上下看进去的透视椭圆弧度

        class Particle {
            constructor(localX, localY, localZ, color, type) {
                this.localX = localX;
                this.localY = localY;
                this.localZ = localZ;
                
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                this.color = color;
                this.type = type; 
                
                const sizeScale = scaleFactor < 1 ? scaleFactor * 1.1 : 1;
                if (type === 'flame') {
                    this.baseSize = (Math.random() * 1.5 + 1.2) * sizeScale;
                } else {
                    this.baseSize = (Math.random() * 0.9 + 0.4) * sizeScale; 
                }
                this.size = this.baseSize;

                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 0.04 + 0.02;
                this.friction = 0.88;
                this.baseAlpha = Math.random() * 0.4 + 0.55;
                this.alpha = this.baseAlpha;

                // 烟雾爆发四散
                this.smokeVx = (Math.random() - 0.5) * 18; 
                this.smokeVy = -Math.random() * 6 - 4;     
                this.flamePhase = Math.random() * 100;
            }

            update(centerX, centerY) {
                if (state === 'WAITING' || state === 'LISTENING') {
                    // 1. 进行 3D 沿 Y 轴旋转坐标变换 (水平旋转)
                    const cosY = Math.cos(angleY);
                    const sinY = Math.sin(angleY);
                    let x1 = this.localX * cosY - this.localZ * sinY;
                    let z1 = this.localX * sinY + this.localZ * cosY;
                    let y1 = this.localY;

                    // 2. 模拟真正的火焰高频微风摇曳 (复合波形确保自然不呆板)
                    if (this.type === 'flame') {
                        // 越往上摇摆越强烈
                        const t = Date.now() * 0.01 + this.flamePhase;
                        const swayX = Math.sin(t) * Math.cos(t * 0.7) * 1.5 * scaleFactor;
                        const swayZ = Math.cos(t * 0.8) * 1.0 * scaleFactor;
                        x1 += swayX;
                        z1 += swayZ;
                    }

                    // 3. 引入固定俯视矩阵变换 (Pitch - 绕X轴旋转)，构建出高级的向下看透视视觉
                    const cosP = Math.cos(PITCH);
                    const sinP = Math.sin(PITCH);
                    let rx = x1;
                    let ry = y1 * cosP - z1 * sinP;
                    let rz = y1 * sinP + z1 * cosP;

                    // 4. 近大远小的全真透视投影
                    const distance = 350 * scaleFactor;
                    const projection = distance / (distance + rz);
                    
                    const targetScreenX = centerX + rx * projection;
                    // 微调 centerY 偏移，配合下方移位的按钮
                    const targetScreenY = (centerY - 30 * scaleFactor) + ry * projection;

                    let dx = targetScreenX - this.x;
                    let dy = targetScreenY - this.y;
                    
                    this.vx += dx * this.speed;
                    this.vy += dy * this.speed;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;

                    this.size = this.baseSize * projection;
                    
                    if (this.type === 'flame') {
                        // 火焰带有微弱的高频明暗呼吸感
                        const flicker = Math.sin(Date.now() * 0.03 + this.flamePhase) * 0.12;
                        this.alpha = (this.baseAlpha + flicker) * projection;
                    } else {
                        this.alpha = this.baseAlpha * projection;
                    }

                } else if (state === 'BLOWING' || state === 'EXTINGUISHED') {
                    if (this.type === 'flame') {
                        this.x += this.smokeVx;
                        this.y += this.smokeVy;
                        this.smokeVx *= 0.93; 
                        this.smokeVy *= 0.93;
                        this.alpha -= 0.015; 
                        if (this.alpha < 0) this.alpha = 0;
                    } else {
                        // 本体在被吹气时也完美契合最新的3D旋转与透视
                        const cosY = Math.cos(angleY);
                        const sinY = Math.sin(angleY);
                        let x1 = this.localX * cosY - this.localZ * sinY;
                        let z1 = this.localX * sinY + this.localZ * cosY;
                        const cosP = Math.cos(PITCH);
                        const sinP = Math.sin(PITCH);
                        let rx = x1;
                        let ry = this.localY * cosP - z1 * sinP;
                        let rz = this.localY * sinP + z1 * cosP;
                        
                        const distance = 350 * scaleFactor;
                        const projection = distance / (distance + rz);
                        
                        let dx = (centerX + rx * projection) - this.x;
                        let dy = ((centerY - 30 * scaleFactor) + ry * projection) - this.y;
                        this.vx += dx * this.speed;
                        this.vy += dy * this.speed;
                        this.x += this.vx * this.friction;
                        this.y += this.vy * this.friction;
                        this.alpha = this.baseAlpha * projection * 0.5; 
                    }
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            const minDim = Math.min(width, height);
            scaleFactor = width < 500 ? minDim / 350 : minDim / 550; 

            generateCakeParticles();
        }

        // 全新的高密度外壳建模：不带拖尾、透视圆润扎实、环形蜡烛阵列
        function generateCakeParticles() {
            particles = [];

            // 重新优化各层高度与外壁粒子排布，让蛋糕体绝不“薄弱”
            const layers = [
                { rX: 125 * scaleFactor, h: 52 * scaleFactor, count: 4000, color: '#ffb7e2', topColor: '#ffffff' }, 
                { rX: 92 * scaleFactor,  h: 44 * scaleFactor, count: 2800, color: '#e056fd', topColor: '#ffffff' }, 
                { rX: 62 * scaleFactor,  h: 36 * scaleFactor, count: 1800, color: '#ff75b5', topColor: '#fff0f5' }  
            ];

            let currentBaseY = 70 * scaleFactor; 

            layers.forEach((layer) => {
                for (let i = 0; i < layer.count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    // 通过对半径采用高次方数学分布，让粒子大量聚集在外壁外轮廓上，形成坚实清晰的轮廓边界
                    const randR = Math.pow(Math.random(), 0.4); 
                    const lx = Math.cos(angle) * layer.rX * randR;
                    const lz = Math.sin(angle) * layer.rX * randR;
                    const lh = Math.random() * layer.h;
                    const ly = currentBaseY - lh;

                    let color = layer.color;
                    // 强化顶边缘高光
                    if (lh > layer.h - 3) {
                        color = layer.topColor; 
                    } else if (Math.cos(angle) > 0.5) {
                        color = '#ffffff'; 
                    }

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }
                currentBaseY -= (layer.h - 4 * scaleFactor);
            });

            // 蜡烛环形均匀围绕排列 (就像原视频那样在顶层环形错落站立，转起来极具立体交错感)
            const candleRadius = 28 * scaleFactor;
            const candlePositions = [];
            for (let i = 0; i < 3; i++) {
                const angle = (i * Math.PI * 2) / 3; // 120度均匀环形等分
                candlePositions.push({
                    x: Math.cos(angle) * candleRadius,
                    z: Math.sin(angle) * candleRadius,
                    y: currentBaseY
                });
            }

            candlePositions.forEach(pos => {
                const candleWidth = 4.5 * scaleFactor;
                const candleHeight = 26 * scaleFactor;
                
                // 扎实的蜡烛柱体
                for (let i = 0; i < 110; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * candleWidth;
                    const lx = pos.x + Math.cos(angle) * r;
                    const lz = pos.z + Math.sin(angle) * r;
                    const ly = pos.y - Math.random() * candleHeight;
                    particles.push(new Particle(lx, ly, lz, '#ffffff', 'candle'));
                }
                
                // 【黄金比例优化】精简、精致的圆润短火焰算法
                const flameHeight = 16 * scaleFactor; // 明显缩短火焰高度，与原图比例完美统一
                const maxFlameWidth = 6.0 * scaleFactor;
                
                for (let i = 0; i < 180; i++) {
                    const t = Math.random(); 
                    
                    // 经典饱满水滴包络线
                    const envelope = Math.sin(t * Math.PI) * (1 - t * 0.4);
                    const currentMaxWidth = maxFlameWidth * envelope;
                    
                    const fAngle = Math.random() * Math.PI * 2;
                    const fR = Math.random() * currentMaxWidth;
                    
                    const lx = pos.x + Math.cos(fAngle) * fR;
                    const lz = pos.z + Math.sin(fAngle) * fR;
                    const ly = (pos.y - candleHeight) - (t * flameHeight);
                    
                    const color = t < 0.6 && Math.random() > 0.28 ? '#ffe600' : '#ff4500';
                    particles.push(new Particle(lx, ly, lz, color, 'flame'));
                }
            });
        }

        function animate() {
            // 【关键修改】改为纯黑全清除，彻底干掉任何拖尾阴影，带来绝对清爽利落的画质
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#06010a';
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalCompositeOperation = 'screen';

            if (state === 'WAITING' || state === 'LISTENING' || state === 'BLOWING') {
                angleY += 0.007; // 平稳优雅的旋转速度
            }

            if (state === 'BLOWING') {
                blowTimer++;
                if (blowTimer > 90) { 
                    state = 'EXTINGUISHED';
                    resetBtn.style.display = 'block';   
                }
            }

            const centerX = width / 2;
            const centerY = height * 0.55; 

            particles.forEach(p => {
                p.update(centerX, centerY);
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        function startAudioListening() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.4; 
                analyser.fftSize = 512;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    if (state !== 'LISTENING') return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;

                    if (average > BLOW_THRESHOLD) {
                        state = 'BLOWING';
                        blowTimer = 0;
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            })
            .catch(err => {
                console.warn("麦克风不可用:", err);
            });
        }

        wishBtn.addEventListener('click', () => {
            wishBtn.style.display = 'none';
            headerBlock.classList.add('show'); 
            state = 'LISTENING';
            startAudioListening();
        });

        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            headerBlock.classList.remove('show'); 
            wishBtn.style.display = 'block';
            state = 'WAITING';
            generateCakeParticles(); 
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
