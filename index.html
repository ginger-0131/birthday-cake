<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Particle Dream Cake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06010a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 60px 20px;
        }
        .header {
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #f3adff;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(243, 173, 255, 0.6);
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            z-index: 10;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 110px;
            justify-content: center;
        }
        .btn {
            background: linear-gradient(135deg, #da44ff, #892cdc);
            border: none;
            color: white;
            padding: 16px 45px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(137, 44, 220, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(218, 68, 255, 0.8);
        }
        .btn.reset-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.5);
        }
        .status-text {
            font-size: 1.2rem;
            font-weight: 400;
            color: #00ffcc;
            text-align: center;
            max-width: 300px;
            line-height: 1.6;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="mainTitle">Blow out the candles, catch the magic.</h1>
    </div>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="wishBtn">✨ Make a Wish</button>
        <div class="status-text" id="statusText" style="display: none;"></div>
        <button class="btn reset-btn" id="resetBtn" style="display: none;">� Light Again</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const wishBtn = document.getElementById('wishBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const mainTitle = document.getElementById('mainTitle');

        let width, height;
        let particles = [];
        let state = 'WAITING'; // WAITING, LISTENING, BLOWING, EXTINGUISHED
        let blowTimer = 0;
        let activeStream = null; // 用于存储麦克风流
        
        // 【关键参数】调整吹气灵敏度。
        const BLOW_THRESHOLD = 75; 

        class Particle {
            constructor(targetX, targetY, color, type) {
                this.targetX = targetX;
                this.targetY = targetY;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.color = color;
                this.type = type; 
                
                if (type === 'flame') {
                    this.size = Math.random() * 1.6 + 1.2;
                } else if (type === 'cream') {
                    this.size = Math.random() * 1.2 + 0.8;
                } else {
                    this.size = Math.random() * 0.8 + 0.5; 
                }

                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 0.04 + 0.02;
                this.friction = 0.88;
                this.baseAlpha = Math.random() * 0.5 + 0.5;
                this.alpha = this.baseAlpha;

                // 烟雾扩散随机方向速度系数
                this.smokeVx = (Math.random() - 0.5) * 12; // 极大的左右扩散范围
                this.smokeVy = -Math.random() * 6 - 2;     // 向上且向四周蔓延
            }

            update() {
                if (state === 'WAITING' || state === 'LISTENING') {
                    let dx = this.targetX - this.x;
                    let dy = this.targetY - this.y;
                    
                    if (this.type === 'flame') {
                        dx += Math.sin(Date.now() * 0.008 + this.targetY) * 2.5;
                        dy += Math.cos(Date.now() * 0.006 + this.targetX) * 1.5 - 0.5;
                    }

                    this.vx += dx * this.speed;
                    this.vy += dy * this.speed;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha = this.baseAlpha;

                // 【核心修改】像烟雾一样大面积、大范围四散消散
                } else if (state === 'BLOWING' || state === 'EXTINGUISHED') {
                    if (this.type === 'flame') {
                        // 使用预设的爆发烟雾速度，加上一点空气阻力
                        this.x += this.smokeVx;
                        this.y += this.smokeVy;
                        this.smokeVx *= 0.95; // 模拟烟雾散开后慢慢减速
                        this.smokeVy *= 0.95;
                        
                        this.alpha -= 0.015; // 稍微变慢消散速度，让烟雾爆开过程更清晰可见
                        if (this.alpha < 0) this.alpha = 0;
                    } else {
                        // 蛋糕本体和蜡烛柱体稳稳留在原地不变
                        let dx = this.targetX - this.x;
                        let dy = this.targetY - this.y;
                        this.vx += dx * this.speed;
                        this.vy += dy * this.speed;
                        this.vx *= this.friction;
                        this.vy *= this.friction;
                        this.x += this.vx;
                        this.y += this.vy;
                        this.alpha = this.baseAlpha * 0.7; 
                    }
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generateCakeParticles();
        }

        function generateCakeParticles() {
            particles = [];
            const centerX = width / 2;
            const centerY = height * 0.58; 

            const layers = [
                { rX: 130, rY: 45, h: 55, count: 6500, color: '#4a154b', topColor: '#f7adff', type: 'cake' }, 
                { rX: 100, rY: 35, h: 48, count: 4500, color: '#e056fd', topColor: '#ffffff', type: 'cake' }, 
                { rX: 70,  rY: 25, h: 40, count: 3000, color: '#ff75b5', topColor: '#fff0f5', type: 'cake' }  
            ];

            let currentBaseY = centerY;

            layers.forEach((layer) => {
                for (let i = 0; i < layer.count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const randR = Math.sqrt(Math.random()); 
                    const curRX = layer.rX * randR;
                    const curRY = layer.rY * randR;
                    
                    const px = centerX + Math.cos(angle) * curRX;
                    const ph = Math.random() * layer.h;
                    const py = currentBaseY - Math.sin(angle) * curRY - ph;

                    let color = layer.color;
                    if (ph > layer.h - 4) {
                        color = layer.topColor; 
                    } else if (Math.cos(angle) > 0.4) {
                        color = adjustColorBrightness(layer.color, -30); 
                    } else if (Math.cos(angle) < -0.6) {
                        color = '#ffffff'; 
                    }

                    particles.push(new Particle(px, py, color, 'cake'));

                    if (ph > layer.h - 2 && Math.random() > 0.96) {
                        particles.push(new Particle(px, py - 2, '#00ffcc', 'cream'));
                    }
                }
                currentBaseY -= (layer.h - 8);
            });

            const candlePositions = [
                { x: centerX - 30, y: currentBaseY - 12 },
                { x: centerX,       y: currentBaseY - 18 },
                { x: centerX + 30, y: currentBaseY - 12 }
            ];

            candlePositions.forEach(pos => {
                for (let i = 0; i < 120; i++) {
                    const px = pos.x + (Math.random() - 0.5) * 4;
                    const py = pos.y - Math.random() * 28;
                    particles.push(new Particle(px, py, '#ffffff', 'candle'));
                }
                for (let i = 0; i < 250; i++) {
                    const px = pos.x + (Math.random() - 0.5) * 6;
                    const fh = Math.pow(Math.random(), 1.5) * 22; 
                    const py = (pos.y - 28) - fh;
                    const color = Math.random() > 0.35 ? '#ffe600' : '#ff4500';
                    particles.push(new Particle(px, py, color, 'flame'));
                }
            });
        }

        function adjustColorBrightness(hex, percent) {
            let R = parseInt(hex.substring(1,3),16);
            let G = parseInt(hex.substring(3,5),16);
            let B = parseInt(hex.substring(5,7),16);
            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);
            R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
            R = (R<0)?0:R; G = (G<0)?0:G; B = (B<0)?0:B;
            let rHex = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            let gHex = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            let bHex = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
            return "#"+rHex+gHex+bHex;
        }

        function animate() {
            ctx.fillStyle = 'rgba(6, 1, 10, 0.25)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';

            if (state === 'BLOWING') {
                blowTimer++;
                if (blowTimer > 100) { 
                    state = 'EXTINGUISHED';
                    statusText.style.display = 'none'; // 隐藏吹气提示
                    resetBtn.style.display = 'block';   // 浮现重新点亮按钮
                }
            }

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        function startAudioListening() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                activeStream = stream; // 缓存流以便后续关闭
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.4; 
                analyser.fftSize = 512;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    if (state !== 'LISTENING') return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;

                    // 只能通过检测到声音触发，无任何屏幕交互可代替，防止误触
                    if (average > BLOW_THRESHOLD) {
                        state = 'BLOWING';
                        blowTimer = 0;
                        statusText.innerText = "Blowing...";
                        
                        // 触发后关闭麦克风轨道
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            })
            .catch(err => {
                console.warn("麦克风不可用:", err);
                statusText.innerText = "Microphone error. Please refresh and allow mic access.";
            });
        }

        // 1. 点击许愿按钮开始聆听
        wishBtn.addEventListener('click', () => {
            wishBtn.style.display = 'none';
            statusText.style.display = 'block';
            statusText.innerText = "Now, blow into the microphone... �";
            state = 'LISTENING';
            startAudioListening();
        });

        // 2. 点击重新点亮按钮复原
        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            wishBtn.style.display = 'block';
            state = 'WAITING';
            // 重新初始化粒子系统以复原火焰
            generateCakeParticles();
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
