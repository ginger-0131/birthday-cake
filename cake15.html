<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Particle Dream Cake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #06010a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 40px 20px;
            -webkit-user-select: none;
            user-select: none;
        }
        .header {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            max-width: 90vw;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }
        .header.show {
            opacity: 1;
            transform: translateY(0);
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #ebd2ff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(235, 210, 255, 0.4);
            line-height: 1.3;
        }
        .header p {
            color: #928b9c;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            z-index: 10;
            margin-bottom: 80px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90px;
            justify-content: center;
            width: 100%;
        }
        .btn {
            background: transparent;
            border: 2px dashed rgba(195, 127, 255, 0.5); 
            color: #ebd2ff;
            padding: 13px 45px;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(123, 83, 204, 0.1);
            transition: all 0.4s ease;
            margin-top: 20px;
            backdrop-filter: blur(4px);
        }
        .btn:hover {
            border-color: rgba(195, 127, 255, 0.9);
            box-shadow: 0 0 25px rgba(123, 83, 204, 0.25);
            background: rgba(195, 127, 255, 0.05);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn.reset-btn {
            border-color: rgba(122, 210, 240, 0.5);
            color: #cbeeff;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.1);
        }
        .btn.reset-btn:hover {
            border-color: rgba(122, 210, 240, 0.9);
            background: rgba(79, 172, 254, 0.05);
        }
        @media (min-width: 768px) {
            .header h1 { font-size: 2.2rem; }
            .btn { padding: 15px 50px; font-size: 1.05rem; }
            .controls { margin-bottom: 100px; }
        }
    </style>
</head>
<body>

    <div class="header" id="headerBlock">
        <h1>Cheers to another beautiful year!</h1>
        <p>Make a wish and blow out the candles. 💨</p>
    </div>

    <div id="canvas-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn" id="wishBtn">✨ Tap Me</button>
        <button class="btn reset-btn" id="resetBtn" style="display: none;">🔥 Light Again</button>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const wishBtn = document.getElementById('wishBtn');
        const resetBtn = document.getElementById('resetBtn');
        const headerBlock = document.getElementById('headerBlock');

        let width, height, scaleFactor;
        let particles = [];
        let state = 'WAITING'; 
        let blowTimer = 0;
        let spawnTicks = 0; // 新增开场计时器，用于实现前快后慢的优雅定格
        
        let angleY = 0; 
        let isDragging = false;
        let previousX = 0;
        let velocityX = 0; 

        const BLOW_THRESHOLD = 75; 
        const PITCH = 0.18; 

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function interpolateColor(color1, color2, factor) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * factor);
            const g = Math.round(c1.g + (c2.g - c1.g) * factor);
            const b = Math.round(c1.b + (c2.b - c1.b) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        class Particle {
            constructor(localX, localY, localZ, color, type, flameHeightRatio = 0) {
                this.localX = localX;
                this.localY = localY;
                this.localZ = localZ;
                
                // 初始出生点分布在整个屏幕边缘或更远，营造漫天而来的爆发感
                const spawnRadius = Math.max(window.innerWidth, window.innerHeight) * 1.2;
                const spawnAngle = Math.random() * Math.PI * 2;
                this.x = window.innerWidth / 2 + Math.cos(spawnAngle) * spawnRadius * (Math.random() * 0.4 + 0.8);
                this.y = window.innerHeight / 2 + Math.sin(spawnAngle) * spawnRadius * (Math.random() * 0.4 + 0.8);
                
                this.color = color;
                this.type = type; 
                this.flameHeightRatio = flameHeightRatio; 
                
                const sizeScale = scaleFactor < 1 ? scaleFactor * 1.1 : 1;
                if (type === 'flame') {
                    this.baseSize = (Math.random() * 1.5 + 1.2) * sizeScale;
                } else if (type === 'text') {
                    this.baseSize = (Math.random() * 0.6 + 0.65) * sizeScale; // 放大字号后粒子大小微调
                } else {
                    this.baseSize = (Math.random() * 0.8 + 0.45) * sizeScale; 
                }
                this.size = this.baseSize;

                this.vx = 0;
                this.vy = 0;
                
                // 基础速度系数
                this.baseSpeed = Math.random() * 0.04 + 0.06; 
                this.friction = 0.80; // 略微增加阻力，配合前快后慢的急停感
                
                this.baseAlpha = type === 'text' ? (Math.random() * 0.25 + 0.7) : (Math.random() * 0.35 + 0.55);
                this.alpha = this.baseAlpha;

                this.smokeVx = (Math.random() - 0.5) * 18; 
                this.smokeVy = -Math.random() * 6 - 4;     
                this.flamePhase = Math.random() * 100;
            }

            update(centerX, centerY) {
                if (state === 'WAITING' || state === 'LISTENING' || state === 'BLOWING' || state === 'EXTINGUISHED') {
                    let targetScreenX, targetScreenY, projection = 1;

                    // 【核心逻辑重构】如果粒子是文字(text)，彻底跳过3D旋转与透视，锁死在二维平面
                    if (this.type === 'text') {
                        targetScreenX = centerX + this.localX;
                        targetScreenY = centerY + this.localY;
                        this.size = this.baseSize;
                        this.alpha = this.baseAlpha;
                    } else {
                        // 蛋糕、蜡烛、火焰等3D物体，保留高级旋转逻辑
                        let x1 = this.localX;
                        let z1 = this.localZ;
                        let y1 = this.localY;

                        if (this.type === 'flame') {
                            const time = Date.now() * 0.008 + this.flamePhase;
                            const swing = Math.sin(time + this.flameHeightRatio * 3.2) * 2.8 * this.flameHeightRatio * scaleFactor;
                            x1 += swing;
                            z1 += Math.cos(time * 0.9 + this.flameHeightRatio * 2.5) * 1.4 * this.flameHeightRatio * scaleFactor;
                        }

                        const cosY = Math.cos(angleY);
                        const sinY = Math.sin(angleY);
                        let rx1 = x1 * cosY - z1 * sinY;
                        let rz1 = x1 * sinY + z1 * cosY;

                        const cosP = Math.cos(PITCH);
                        const sinP = Math.sin(PITCH);
                        let rx = rx1;
                        let ry = y1 * cosP - rz1 * sinP;
                        let rz = y1 * sinP + rz1 * cosP;

                        const distance = 360 * scaleFactor;
                        projection = distance / (distance + rz);
                        
                        targetScreenX = centerX + rx * projection;
                        targetScreenY = centerY + ry * projection;
                    }

                    if (state === 'WAITING' || state === 'LISTENING') {
                        let dx = targetScreenX - this.x;
                        let dy = targetScreenY - this.y;
                        
                        // 【非线性速度控制】开场 1.5 秒内极速前进，1.5~3 秒速度变缓优雅定格
                        let currentSpeed = this.baseSpeed * 2.2; // 初始极速爆发
                        if (spawnTicks > 90) {  // 约1.5秒后
                            currentSpeed = this.baseSpeed * 0.55; // 速度减慢，细腻揉合沉淀
                        }

                        this.vx += dx * currentSpeed;
                        this.vy += dy * currentSpeed;
                        this.vx *= this.friction;
                        this.vy *= this.friction;
                        this.x += this.vx;
                        this.y += this.vy;

                        if (this.type !== 'text') {
                            this.size = this.baseSize * projection;
                            if (this.type === 'flame') {
                                const flicker = Math.sin(Date.now() * 0.05 + this.flamePhase) * 0.08;
                                this.alpha = (this.baseAlpha + flicker) * projection;
                            } else {
                                this.alpha = this.baseAlpha * projection;
                            }
                        }
                    } else {
                        // 吹灭或散开动画
                        if (this.type === 'flame') {
                            this.x += this.smokeVx;
                            this.y += this.smokeVy;
                            this.smokeVx *= 0.93; 
                            this.smokeVy *= 0.93;
                            this.alpha -= 0.015; 
                        } else if (this.type === 'text') {
                            this.alpha -= 0.02; 
                        } else {
                            let dx = targetScreenX - this.x;
                            let dy = targetScreenY - this.y;
                            this.vx += dx * this.baseSpeed;
                            this.vy += dy * this.baseSpeed;
                            this.x += this.vx * this.friction;
                            this.y += this.vy * this.friction;
                            this.alpha = this.baseAlpha * projection * 0.4;
                        }
                    }
                    if (this.alpha < 0) this.alpha = 0;
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            const minDim = Math.min(width, height);
            scaleFactor = width < 500 ? minDim / 350 : minDim / 550; 

            generateCakeParticles();
        }

        // 获取二维大字点阵的方法
        function getTextPoints(text, fontSize) {
            const memCanvas = document.createElement('canvas');
            const memCtx = memCanvas.getContext('2d');
            // 根据放大后的字体动态增加画布空间
            memCanvas.width = 750;
            memCanvas.height = 120;
            
            memCtx.fillStyle = '#000';
            memCtx.fillRect(0, 0, memCanvas.width, memCanvas.height);
            
            memCtx.fillStyle = '#fff';
            memCtx.font = `bold ${fontSize}px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif`;
            memCtx.textAlign = 'center';
            memCtx.textBaseline = 'middle';
            memCtx.fillText(text, memCanvas.width / 2, memCanvas.height / 2);
            
            const imgData = memCtx.getImageData(0, 0, memCanvas.width, memCanvas.height);
            const points = [];
            // 步长紧密排布，确保大字粒子饱满充实
            const step = width < 500 ? 3 : 2; 
            
            for (let y = 0; y < memCanvas.height; y += step) {
                for (let x = 0; x < memCanvas.width; x += step) {
                    const idx = (y * memCanvas.width + x) * 4;
                    if (imgData.data[idx] > 128) {
                        points.push({
                            lx: (x - memCanvas.width / 2),
                            ly: (y - memCanvas.height / 2)
                        });
                    }
                }
            }
            return points;
        }

        function generateCakeParticles() {
            particles = [];
            spawnTicks = 0; // 重置汇聚计时器

            // 1. 【升级】大 1.5 倍的纯二维静止粒子标题 HAPPY BIRTHDAY（字号由46调大至70）
            const textFontSize = Math.floor(70 * scaleFactor); 
            const textPoints = getTextPoints("HAPPY BIRTHDAY", textFontSize);
            
            textPoints.forEach(pt => {
                // 在二维画布中的绝对悬浮定位（脱离3D轴，永远面向屏幕正面）
                const lx = pt.lx * 0.52 * scaleFactor;
                const ly = -155 * scaleFactor + pt.ly * 0.52 * scaleFactor; 
                
                const color = interpolateColor('#e8d3fc', '#f7d3e6', Math.random());
                particles.push(new Particle(lx, ly, 0, color, 'text'));
            });

            // 2. 扁宽大气的三层蛋糕底座
            const layers = [
                { rX: 145 * scaleFactor, h: 40 * scaleFactor, bottomColor: '#6c3b8f', topColor: '#dfc2f2' }, 
                { rX: 110 * scaleFactor, h: 38 * scaleFactor, bottomColor: '#9e4776', topColor: '#f7d3e6' }, 
                { rX: 75 * scaleFactor,  h: 34 * scaleFactor, bottomColor: '#4f5d85', topColor: '#d6e0f5' }  
            ];

            let currentBaseY = 80 * scaleFactor; 

            layers.forEach((layer) => {
                const sideCount = Math.floor(layer.rX * 24); 
                for (let i = 0; i < sideCount; i++) {
                    const angle = (i / sideCount) * Math.PI * 2;
                    const lh = Math.random() * layer.h;
                    
                    const lx = Math.cos(angle) * layer.rX;
                    const lz = Math.sin(angle) * layer.rX;
                    const ly = currentBaseY - lh;

                    const colorFactor = lh / layer.h;
                    let color = interpolateColor(layer.bottomColor, layer.topColor, colorFactor);
                    if (Math.cos(angle) > 0.75 && Math.random() > 0.8) color = '#ffffff';

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }

                const topCount = Math.floor(layer.rX * layer.rX * 0.16);
                for (let i = 0; i < topCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const randR = Math.sqrt(Math.random()); 
                    const curR = layer.rX * randR;

                    const lx = Math.cos(angle) * curR;
                    const lz = Math.sin(angle) * curR;
                    const ly = currentBaseY - layer.h;

                    let color = interpolateColor(layer.bottomColor, layer.topColor, 0.72);
                    if (Math.cos(angle) > 0.6 && Math.random() > 0.65) color = '#ffffff';

                    particles.push(new Particle(lx, ly, lz, color, 'cake'));
                }
                currentBaseY -= (layer.h - 4 * scaleFactor);
            });

            // 3. 6根金灿灿的细矮烛台
            const candleRadius = 42 * scaleFactor; 
            const candlePositions = [];
            const candleCount = 6; 
            for (let i = 0; i < candleCount; i++) {
                const angle = (i * Math.PI * 2) / candleCount; 
                candlePositions.push({
                    x: Math.cos(angle) * candleRadius,
                    z: Math.sin(angle) * candleRadius,
                    y: currentBaseY
                });
            }

            const goldColor1 = '#f7db8c'; 
            const goldColor2 = '#dca94a'; 

            candlePositions.forEach(pos => {
                const candleWidth = 3.2 * scaleFactor; 
                const candleHeight = 34 * scaleFactor; 
                
                const cSideCount = 28; 
                const cHeightLayers = 15; 
                for (let h = 0; h < cHeightLayers; h++) {
                    const lh = (h / cHeightLayers) * candleHeight;
                    const ly = pos.y - lh;
                    for (let s = 0; s < cSideCount; s++) {
                        const cAngle = (s / cSideCount) * Math.PI * 2;
                        const lx = pos.x + Math.cos(cAngle) * candleWidth;
                        const lz = pos.z + Math.sin(cAngle) * candleWidth;
                        
                        const factor = (Math.cos(cAngle) + 1) / 2;
                        const color = interpolateColor(goldColor2, goldColor1, factor);
                        particles.push(new Particle(lx, ly, lz, color, 'candle'));
                    }
                }
                
                const cTopCount = 12;
                for(let i=0; i<cTopCount; i++) {
                    const cAngle = Math.random() * Math.PI * 2;
                    const cR = Math.sqrt(Math.random()) * candleWidth;
                    const lx = pos.x + Math.cos(cAngle) * cR;
                    const lz = pos.z + Math.sin(cAngle) * cR;
                    particles.push(new Particle(lx, pos.y - candleHeight, lz, goldColor1, 'candle'));
                }
                
                // 4. 纯正饱满的红黄圆润暖焰
                const flameHeight = 14 * scaleFactor; 
                const maxFlameWidth = 11.5 * scaleFactor; 
                const flameParticlesCount = 160;
                
                for (let i = 0; i < flameParticlesCount; i++) {
                    const t = Math.random(); 
                    const envelope = Math.sin(t * Math.PI * 0.82) * (1 - t * 0.65);
                    const fAngle = Math.random() * Math.PI * 2;
                    const randR = Math.sqrt(Math.random()); 
                    const currentRadius = maxFlameWidth * envelope * randR;
                    
                    const lx = pos.x + Math.cos(fAngle) * currentRadius;
                    const lz = pos.z + Math.sin(fAngle) * currentRadius;
                    const ly = (pos.y - candleHeight) - (t * flameHeight);
                    
                    let color;
                    if (randR < 0.4) {
                        color = interpolateColor('#ffa600', '#ffcc00', randR / 0.4);
                    } else if (randR < 0.8) {
                        const factor = (randR - 0.4) / 0.4;
                        color = interpolateColor('#ffcc00', '#ff6600', factor);
                    } else {
                        const factor = (randR - 0.8) / 0.2;
                        color = interpolateColor('#ff6600', '#ff2200', factor);
                    }
                    
                    if (t > 0.7) {
                        color = interpolateColor('#ff8c00', '#ff1a00', (t - 0.7) / 0.3);
                    }
                    
                    particles.push(new Particle(lx, ly, lz, color, 'flame', t));
                }
            });
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#06010a';
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalCompositeOperation = 'screen';

            spawnTicks++; // 累加诞生帧数

            if (!isDragging) {
                // 【动画算法修正】开场前 180 帧（大约 3 秒）汇聚期间，强行让转速保持为 0！
                // 这彻底杜绝了粒子一边聚拢一边被离心力甩开导致的“反复聚散拉扯感”
                if (spawnTicks > 180) {
                    angleY += velocityX;
                    velocityX *= 0.95; 
                    if (Math.abs(velocityX) < 0.005) {
                        velocityX = 0.005; // 3秒后才开启极其平缓自然的自转
                    }
                } else {
                    angleY = 0;
                    velocityX = 0;
                }
            }

            if (state === 'BLOWING') {
                blowTimer++;
                if (blowTimer > 90) { 
                    state = 'EXTINGUISHED';
                    resetBtn.style.display = 'block';   
                }
            }

            const centerX = width / 2;
            const centerY = height * 0.44; 

            particles.forEach(p => {
                p.update(centerX, centerY);
                p.draw();
            });

            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }

        function handleStart(clientX) {
            // 只有当聚拢成型自转开启后（>3秒），才允许用户手势介入旋转
            if (spawnTicks < 180) return;
            isDragging = true;
            previousX = clientX;
            velocityX = 0;
        }

        function handleMove(clientX) {
            if (!isDragging) return;
            const deltaX = clientX - previousX;
            previousX = clientX;
            angleY += deltaX * 0.008; 
            velocityX = deltaX * 0.008; 
        }

        function handleEnd() {
            isDragging = false;
        }

        window.addEventListener('mousedown', (e) => {
            if(e.target.tagName === 'BUTTON') return; 
            handleStart(e.clientX);
        });
        window.addEventListener('mousemove', (e) => handleMove(e.clientX));
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON') return;
            handleStart(e.touches[0].clientX);
        });
        window.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX);
        });
        window.addEventListener('touchend', handleEnd);

        function startAudioListening() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.4; 
                analyser.fftSize = 512;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    if (state !== 'LISTENING') return;
                    
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) {
                        values += array[i];
                    }
                    const average = values / array.length;

                    if (average > BLOW_THRESHOLD) {
                        state = 'BLOWING';
                        blowTimer = 0;
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            })
            .catch(err => {
                console.warn("麦克风不可用:", err);
            });
        }

        wishBtn.addEventListener('click', () => {
            wishBtn.style.display = 'none';
            headerBlock.classList.add('show'); 
            state = 'LISTENING';
            startAudioListening();
        });

        resetBtn.addEventListener('click', () => {
            resetBtn.style.display = 'none';
            headerBlock.classList.remove('show'); 
            wishBtn.style.display = 'block';
            state = 'WAITING';
            generateCakeParticles(); 
        });

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
